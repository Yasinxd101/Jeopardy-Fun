<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Anime Jeopardy</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #0b0f24;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
  a { color: #6a72a8; }
  .wrap {
    min-height: 100vh;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .inner { width: 100%; }
  .title {
    font-size: 40px; font-weight: 900; text-align: center;
    margin: 12px 0 2px; color: #ffd166; letter-spacing: 1px;
    text-shadow: 0 2px 0 #00000055;
  }
  .sub { text-align: center; color: #aab0d8; margin: 0 0 24px; }
  .card { background: #161b3d; border-radius: 16px; padding: 20px; box-shadow: 0 8px 30px #00000044; }
  .lbl { font-size: 13px; color: #aab0d8; font-weight: 600; }
  .input {
    padding: 12px 14px; border-radius: 10px; border: none; font-size: 16px;
    background: #0d1230; color: #fff; outline: none; flex: 1; width: 100%;
  }
  .btn-gold {
    padding: 0 18px; border-radius: 10px; border: none; background: #ffd166;
    color: #0b0f24; font-weight: 800; font-size: 16px; cursor: pointer;
  }
  .row-item { display: flex; align-items: center; gap: 10px; background: #0d1230; border-radius: 10px; padding: 10px 12px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .big-gold {
    width: 100%; margin-top: 18px; padding: 14px; border-radius: 12px; border: none;
    background: #ffd166; color: #0b0f24; font-weight: 900; font-size: 18px; cursor: pointer;
  }
  .big-disabled {
    width: 100%; margin-top: 18px; padding: 14px; border-radius: 12px; border: none;
    background: #2a2f55; color: #6a72a8; font-weight: 900; font-size: 18px; cursor: default;
  }
  .x-btn { background: none; border: none; color: #ff6b8a; font-size: 18px; cursor: pointer; font-weight: 700; }
  .answer-box {
    margin-top: 18px; background: #13351f; border: 2px solid #2cb67d; border-radius: 12px;
    padding: 16px 18px; text-align: center; font-size: 20px; font-weight: 800; color: #7ee2b0;
  }
  .plus-btn { background: #2cb67d; border: none; color: #04210f; font-weight: 900; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .minus-btn { background: #ff5470; border: none; color: #2a0410; font-weight: 900; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .chip { display: flex; align-items: center; gap: 7px; border-radius: 999px; padding: 7px 14px; font-weight: 800; font-size: 14px; }
  .board-grid { display: grid; gap: 6px; }
  .cat-head {
    border-radius: 8px; padding: 8px 4px; text-align: center; font-weight: 800;
    font-size: 11px; min-height: 52px; display: flex; align-items: center; justify-content: center;
  }
  .tile {
    border: none; border-radius: 8px; padding: 16px 4px; font-weight: 900;
    font-size: 18px; min-height: 56px;
  }
  .video-frame {
    position: relative; width: 100%; padding-bottom: 56.25%;
    border-radius: 14px; overflow: hidden; background: #000;
  }
  .video-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .strip-top { position: absolute; top: 0; left: 0; right: 0; height: 64px; background: #000; pointer-events: none; }
  .play-cover {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
    background: #080a18; color: #fff; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .play-circle {
    width: 76px; height: 76px; border-radius: 50%; background: #ffd166; color: #0b0f24;
    display: flex; align-items: center; justify-content: center; font-size: 34px; padding-left: 6px;
  }
  .err { color: #ff8aa0; font-size: 13px; font-weight: 600; margin: 8px 0 0; }
  .muted { color: #6a72a8; text-align: center; font-size: 14px; margin: 8px 0; }

  /* ---- board picker ---- */
  .boards-bg {
    min-height: 100vh; box-sizing: border-box;
    padding: 48px 20px 32px;
    display: flex; justify-content: center;
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 209, 102, 0.10), transparent 55%),
      linear-gradient(165deg, #161c42 0%, #0b0f24 55%, #060812 100%);
    position: relative;
    overflow: hidden;
  }
  .boards-bg::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at 50% 0%, #000 0%, transparent 75%);
  }
  .boards-wrap { width: 100%; max-width: 540px; position: relative; z-index: 1; }
  .boards-header { text-align: center; margin-bottom: 30px; }
  .boards-title {
    margin: 0; font-size: 42px; font-weight: 900; letter-spacing: 2px;
    color: #ffd166; text-shadow: 0 0 22px rgba(255, 209, 102, 0.45), 0 2px 0 #00000066;
  }
  .boards-subtitle { margin: 8px 0 0; color: #aab0d8; font-size: 15px; font-weight: 600; }
  .boards-grid { display: flex; flex-direction: column; gap: 16px; }
  .board-card {
    position: relative; display: flex; align-items: center; gap: 16px;
    width: 100%; text-align: left; border: none; cursor: pointer;
    background: linear-gradient(155deg, #1c2252 0%, #131838 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-left: 4px solid var(--accent);
    border-radius: 18px; padding: 20px 18px 24px;
    box-shadow: 0 10px 28px -10px rgba(0, 0, 0, 0.6);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .board-card:hover, .board-card:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 14px 34px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px var(--accent);
  }
  .board-card:active { transform: translateY(0); filter: brightness(0.96); }
  .board-card-icon {
    flex-shrink: 0; width: 50px; height: 50px; border-radius: 14px;
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .board-card-body { flex: 1; min-width: 0; }
  .board-card-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.2px; }
  .board-card-tagline { margin-top: 4px; font-size: 13px; color: #aab0d8; line-height: 1.4; }
  .board-card-cta { flex-shrink: 0; font-size: 13px; font-weight: 800; color: var(--accent); white-space: nowrap; }
  .board-card-date { position: absolute; bottom: 7px; right: 18px; font-size: 10px; color: #5a6090; font-weight: 600; }

  /* ---- confirmation dialog ---- */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(4, 6, 16, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 50;
  }
  .confirm-card {
    width: 100%; max-width: 340px; background: #161b3d; border-radius: 16px;
    padding: 22px 20px; box-shadow: 0 14px 40px #000000aa; border: 1px solid rgba(255,255,255,0.08);
  }
  .confirm-msg { margin: 0 0 18px; font-size: 15px; line-height: 1.5; color: #fff; font-weight: 600; text-align: center; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-btn-cancel {
    flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    background: #2a2f55; color: #aab0d8; font-weight: 800; font-size: 14px;
  }
  .confirm-btn-yes {
    flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    background: #ff5470; color: #2a0410; font-weight: 800; font-size: 14px;
  }

  /* ---- per-question timer ---- */
  .timer-track { width: 100%; height: 10px; background: #1d2455; border-radius: 6px; overflow: hidden; margin: 14px 0 4px; }
  .timer-bar { height: 100%; width: 100%; background: #ffd166; animation: countdown-bar 20s linear forwards; }
  @keyframes countdown-bar { from { width: 100%; } to { width: 0%; } }

  /* ---- tile feedback ---- */
  .tile { transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease; }
  .tile:not([disabled]):hover { transform: translateY(-2px); filter: brightness(1.12); }
  .tile:not([disabled]):active { transform: scale(0.94); }

  /* ---- clue entrance ---- */
  @keyframes clueIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .clue-enter { animation: clueIn 0.32s ease-out; }

  /* ---- score tick feedback ---- */
  .score-num { display: inline-block; transition: color 0.2s ease; }
  .score-pulse-up { color: #7ee2b0 !important; animation: scorePulse 0.5s ease; }
  .score-pulse-down { color: #ff8aa0 !important; animation: scorePulse 0.5s ease; }
  @keyframes scorePulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ---- win screen ---- */
  .win-bg {
    min-height: 100vh; box-sizing: border-box; padding: 48px 20px 32px;
    display: flex; justify-content: center;
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 209, 102, 0.16), transparent 55%),
      linear-gradient(165deg, #161c42 0%, #0b0f24 55%, #060812 100%);
  }
  .win-wrap { width: 100%; max-width: 480px; animation: winPop 0.45s cubic-bezier(0.2, 1.4, 0.4, 1); }
  @keyframes winPop {
    from { opacity: 0; transform: scale(0.85) translateY(14px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .win-title {
    text-align: center; font-size: 38px; font-weight: 900; letter-spacing: 1px;
    color: #ffd166; text-shadow: 0 0 24px rgba(255, 209, 102, 0.5), 0 2px 0 #00000066;
    margin: 0 0 4px;
  }
  .win-champ-line { text-align: center; color: #fff; font-weight: 700; font-size: 16px; margin: 0 0 22px; }
  .win-board { display: flex; flex-direction: column; gap: 10px; }
  .win-row {
    display: flex; align-items: center; gap: 12px; background: #161b3d;
    border-radius: 14px; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.06);
  }
  .win-row-champ {
    background: linear-gradient(135deg, #2a2410 0%, #161b3d 70%);
    border: 1px solid #ffd166; animation: champGlow 1.8s ease-in-out infinite;
  }
  @keyframes champGlow {
    0%, 100% { box-shadow: 0 0 0px rgba(255, 209, 102, 0.0); }
    50% { box-shadow: 0 0 22px rgba(255, 209, 102, 0.55); }
  }
  .win-rank { font-weight: 900; font-size: 18px; color: #6a72a8; min-width: 26px; }
  .win-row-champ .win-rank { color: #ffd166; }
  .win-name { flex: 1; font-weight: 800; font-size: 16px; color: #fff; }
  .win-score { font-weight: 900; font-size: 18px; color: #aab0d8; }
  .win-row-champ .win-score { color: #ffd166; }
  .win-actions { display: flex; gap: 10px; margin-top: 24px; }

  /* ---- board preview ---- */
  .preview-chip {
    background: #0d1230; border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
    padding: 6px 12px; font-size: 12px; font-weight: 700; color: #aab0d8;
  }

  /* ---- manage players (mid-game) ---- */
  .manage-overlay {
    position: fixed; inset: 0; background: rgba(4, 6, 16, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 40;
  }
  .manage-card {
    width: 100%; max-width: 380px; background: #161b3d; border-radius: 16px;
    padding: 20px; box-shadow: 0 14px 40px #000000aa; border: 1px solid rgba(255,255,255,0.08);
    max-height: 80vh; overflow-y: auto;
  }
  .manage-row { display: flex; align-items: center; gap: 8px; background: #0d1230; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .edit-icon-btn { background: none; border: none; color: #aab0d8; font-size: 15px; cursor: pointer; padding: 4px 6px; }
</style>
</head>

<script>

// Official artist/label uploads (embedding allowed). Scaled by recognizability.

  { value: 200, id: "ZRtdQ81jPUQ", a: 'What is Oshi no Ko? ("Idol" by YOASOBI)' },

var ONEPIECE_TEXT_BOARD = [
  { category: "Straw Hat Crew", questions: [
    { value: 100, q: "This captain wears a straw hat and dreams of becoming Pirate King.", a: "Who is Monkey D. Luffy?" },
    { value: 200, q: "This swordsman aims to become the world's greatest swordsman and fights with three blades.", a: "Who is Roronoa Zoro?" },

    { value: 200, q: "Luffy's Devil Fruit was eventually revealed to actually be this mythical Zoan fruit, not a simple rubber fruit.", a: "What is the Hito Hito no Mi, Model: Nika?" },
    { value: 300, q: "This rare class of Devil Fruit grants control over a natural element like fire, ice, or magma.", a: "What is a Logia?" },

  { category: "World & Lore", questions: [
    { value: 100, q: "This is the ultimate treasure left behind by the Pirate King, sought by pirates across the world.", a: "What is the One Piece?" },
    { value: 200, q: "This brutal sea route is home to the most dangerous pirates and the four Yonko.", a: "What is the Grand Line?" },

var BOARDS = [
  { id: "anime", name: "Anime Jeopardy", date: "2026-06-20", icon: "🎌", accent: "#a786df",
    tagline: "Heroes, villains, powers, and real opening songs.",
    textBoard: ANIME_TEXT_BOARD, videoSlots: ANIME_VIDEO_SLOTS, videoCategory: "Name That Opening",
    final: { category: "Anime Endings & Legacy",
      q: "This 1997 mecha series, helmed by Hideaki Anno, ends with Shinji Ikari confronting his own self-worth in a famously abstract finale.",
      a: "What is Neon Genesis Evangelion?" } },
  { id: "onepiece", name: "One Piece Jeopardy", date: "2026-06-27", icon: "🏴‍☠️", accent: "#3da9fc",
    tagline: "Straw Hats, Warlords, Devil Fruits, and Grand Line lore.",
    textBoard: ONEPIECE_TEXT_BOARD, videoSlots: null,
    final: { category: "Grand Line History",
      q: "According to legend, this forbidden 100-year stretch of erased history lies between the World Government's founding and the present day.",
      a: "What is the Void Century?" } },
];

var PLAYER_COLORS = ["#ff5470", "#3da9fc", "#2cb67d", "#ff8906", "#a786df", "#f25f4c"];
var VIDEO = "VIDEO";
var gold = "#ffd166";

// ---- state ----
var state = {
  phase: "players",      // players | boards | board | question
  menuOpen: false,
  boardId: null,
  players: [],          // {name, score, color}
  nameInput: "",
  nameError: "",
  turn: 0,
  active: null,         // {catKey, qIndex}
  revealed: false,
  answerHidden: false,
  playing: false,
  used: {},
  confirm: null,        // {message, action}
  timerEnabled: false,
  dailyDouble: null,    // {catKey, qIndex}
  wagering: false,
  wager: null,
  wagerInput: "",
  finalDone: false,
  finalStage: null,     // wager | clue | answer
  finalPlayerIndex: 0,
  finalWagers: {},
  finalWagerInput: "",
  finalResults: {},
  muted: false,
  endSoundPlayed: false,
  lastScoreChange: null,  // {playerIndex, delta, finalReset}
  previewBoardId: null,
  managePlayers: false,
  editingPlayerIndex: null,
  editNameInput: "",
  editNameError: "",
};

function currentBoard() {
  return BOARDS.filter(function (b) { return b.id === state.boardId; })[0];
}
function getCategories() {
  var board = currentBoard();
  var cats = board.textBoard.slice();
  if (board.videoSlots) cats = cats.concat([{ category: board.videoCategory || "Name That Opening", isVideo: true }]);
  return cats;
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function hexToRgba(hex, alpha) {
  var h = hex.replace("#", "");
  var r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}
function maxTileValue() {
  var board = currentBoard();
  var max = 0;
  board.textBoard.forEach(function (cat) {
    cat.questions.forEach(function (q) { if (q.value > max) max = q.value; });
  });
  return max;
}
function pickDailyDouble(board) {
  var catIdx = Math.floor(Math.random() * board.textBoard.length);
  var rowIdx = Math.floor(Math.random() * 5);
  return { catKey: catIdx, qIndex: rowIdx };
}
function isDailyDoubleTile(catKey, qIndex) {
  return !!state.dailyDouble && state.dailyDouble.catKey === catKey && state.dailyDouble.qIndex === qIndex;
}
function isAllUsed() {
  var categories = getCategories();
  var totalTiles = categories.length * 5;
  return Object.keys(state.used).length === totalTiles;
}

// ---- sound effects (generated tones, no audio files) ----
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function beep(freq, duration, type, volume) {
  if (state.muted) return;
  try {
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.value = volume || 0.15;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}
function sndSelect() { beep(440, 0.1, "triangle", 0.12); }

// ---- score tick animation ----
function tickScoreDisplay(elId, from, to) {
  var el = document.getElementById(elId);
  if (!el || from === to) return;
  el.classList.add(to >= from ? "score-pulse-up" : "score-pulse-down");
  var start = null;
  var duration = 500;
  function step(ts) {
    if (!start) start = ts;
    var progress = Math.min((ts - start) / duration, 1);
    el.textContent = Math.round(from + (to - from) * progress);
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = to;
      setTimeout(function () { el.classList.remove("score-pulse-up", "score-pulse-down"); }, 250);
    }
  }
  requestAnimationFrame(step);
}

  state.wager = amt;
  state.wagering = false;
  render();

function activeValue() {
  if (!state.active) return 0;
  if (state.wager != null) return state.wager;
  var board = currentBoard();
  if (state.active.catKey === VIDEO) return board.videoSlots[state.active.qIndex].value;

}
function scoreQuestion(i, correct) {
  var val = activeValue();
  var old = state.players[i].score;
  var delta = correct ? val : -val;
  var next = old + delta;
  state.players[i].score = next;
  state.lastScoreChange = { playerIndex: i, delta: delta };
  if (correct) sndCorrect();
  render();
  tickScoreDisplay("score-disp-" + i, old, next);
}
function undoLastScore() {
  var last = state.lastScoreChange;
  if (!last || !state.players[last.playerIndex]) return;
  var old = state.players[last.playerIndex].score;
  var next = old - last.delta;
  state.players[last.playerIndex].score = next;
  if (last.finalReset) delete state.finalResults[last.playerIndex];
  state.lastScoreChange = null;
  state.menuOpen = false;
  render();
  tickScoreDisplay("score-disp-" + last.playerIndex, old, next);
  tickScoreDisplay("score-disp-f" + last.playerIndex, old, next);
}

function submitFinalWager() {
  var i = state.finalPlayerIndex;
  var player = state.players[i];
  var cap = Math.max(player.score, 0);
  var amt = parseInt(state.finalWagerInput, 10);
  if (isNaN(amt)) amt = 0;
  amt = Math.max(0, Math.min(amt, cap));
  state.finalWagers[i] = amt;
  state.finalWagerInput = "";

  var delta = correct ? wager : -wager;
  var next = old + delta;
  state.players[i].score = next;
  state.finalResults[i] = correct ? "correct" : "incorrect";
  state.lastScoreChange = { playerIndex: i, delta: delta, finalReset: true };
  if (correct) sndCorrect();

    { label: "New Players", action: "confirmNewPlayers" },
  ]));

  return menu + '<div class="wrap"><div class="inner" style="max-width:620px;margin:0 auto">' +
    '<div class="clue-enter">' +
      ddBanner +
      '<div style="text-align:center;color:#aab0d8;font-weight:700;font-size:14px;letter-spacing:1px">' + esc(catName.toUpperCase()) + '</div>' +
      '<div style="text-align:center;color:' + gold + ';font-weight:900;font-size:28px;margin-bottom:14px">' + value + ' pts</div>' +
      media + hint + timerBar +
    '</div>' +
    revealBlock + scoreBlock +
  '</div></div>';
}

function viewWin() {
  var ranked = state.players.slice().sort(function (a, b) { return b.score - a.score; });
  var topScore = ranked.length ? ranked[0].score : 0;
  var medals = ["🥇", "🥈", "🥉"];
  var rows = ranked.map(function (p, idx) {
    var isChamp = p.score === topScore;
    return '<div class="win-row' + (isChamp ? " win-row-champ" : "") + '">' +
      '<span class="win-rank">' + (medals[idx] || (idx + 1) + ".") + '</span>' +
      '<span class="dot" style="background:' + p.color + '"></span>' +
      '<span class="win-name">' + esc(p.name) + (isChamp ? " 🎉" : "") + '</span>' +
      '<span class="win-score">' + p.score + '</span>' +
    '</div>';
  }).join("");
  var champNames = ranked.filter(function (p) { return p.score === topScore; }).map(function (p) { return p.name; }).join(" & ");
  var menu = renderMenu(withUndo([
    { label: "Manage Players", action: "openManagePlayers" },
    { label: "Switch Board (Keep Players)", action: "confirmSwitchBoard" },
    { label: "New Game (Reset Scores)", action: "confirmNewRound" },
    { label: "New Players", action: "confirmNewPlayers" },
  ]));
  return menu + '<div class="win-bg"><div class="win-wrap">' +
    '<h1 class="win-title">🏆 Round Over!</h1>' +
    '<p class="win-champ-line">' + esc(champNames) + (champNames.indexOf(" & ") >= 0 ? " tie for the win!" : " wins!") + '</p>' +
    '<div class="win-board">' + rows + '</div>' +
    '<div class="win-actions">' +
      '<button class="big-gold" style="margin-top:0" data-action="confirmNewRound">Play Again</button>' +
      '<button class="big-disabled" style="margin-top:0;background:#2a2f55;color:#fff" data-action="confirmNewPlayers">New Game</button>' +
    '</div>' +
  '</div></div>';
}

function viewBoard() {
  var board = currentBoard();
  var categories = getCategories();

  var chips = state.players.map(function (p, i) {
    var on = i === state.turn;
    return '<div class="chip" style="background:' + (on ? p.color : "#161b3d") + ';color:' + (on ? "#0b0f24" : "#fff") + ';border:2px solid ' + (on ? "#fff" : "transparent") + '">' +
      '<span style="width:10px;height:10px;border-radius:50%;background:' + (on ? "#0b0f24" : p.color) + '"></span>' +
      esc(p.name) + ': ' + p.score +
    '</div>';
  }).join("");

  var heads = categories.map(function (col) {
    return '<div class="cat-head" style="background:' + (col.isVideo ? "#7a2f6f" : "#3a2f8f") + '">' + esc(col.category) + '</div>';
  }).join("");

  var tiles = "";
  for (var row = 0; row < 5; row++) {
    for (var ci = 0; ci < categories.length; ci++) {
      var col = categories[ci];
      var isVideoCol = !!col.isVideo;
      var catKey = isVideoCol ? VIDEO : ci;
      var key = catKey + "-" + row;
      var isUsed = !!state.used[key];
      var val = isVideoCol ? board.videoSlots[row].value : col.questions[row].value;
      var bgc = isUsed ? "#10142e" : (isVideoCol ? "#3a1d3f" : "#1d2455");
      var fgc = isUsed ? "#2a2f55" : gold;
      tiles += '<button class="tile" style="background:' + bgc + ';color:' + fgc + ';cursor:' + (isUsed ? "default" : "pointer") + '" ' +
        (isUsed ? "disabled" : 'data-action="open" data-cat="' + catKey + '" data-row="' + row + '"') + '>' +
        (isUsed ? "" : val) + '</button>';
    }
  }

  var menu = renderMenu(withUndo([
    { label: "Manage Players", action: "openManagePlayers" },
    { label: "Switch Board (Keep Players)", action: "confirmSwitchBoard" },
    { label: "New Game (Reset Scores)", action: "confirmNewRound" },
    { label: "New Players", action: "confirmNewPlayers" },
  ]));

  return menu + '<div style="min-height:100vh;padding:16px 12px"><div style="max-width:820px;margin:0 auto">' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px">' + chips + '</div>' +
    '<div style="text-align:center;color:' + gold + ';font-weight:800;font-size:14px;margin-bottom:14px">' +
      esc(state.players[state.turn].name) + "'s pick" +
    '</div>' +
    '<div class="board-grid" style="grid-template-columns:repeat(' + categories.length + ',1fr)">' + heads + tiles + '</div>' +
  '</div></div>';
}

function viewFinalWager(fin) {
  var i = state.finalPlayerIndex;
  var player = state.players[i];
  var cap = Math.max(player.score, 0);
  return '<div class="wrap"><div class="inner" style="max-width:480px;margin:0 auto">' +
    '<h1 class="title" style="font-size:32px">FINAL JEOPARDY</h1>' +
    '<p class="sub">Category: ' + esc(fin.category) + '</p>' +
    '<div class="card">' +
      '<p style="text-align:center;font-weight:700;margin:0 0 12px">' + esc(player.name) + ', enter your secret wager.</p>' +
      '<label class="lbl">Wager (0 &ndash; ' + cap + ')</label>' +
      '<div style="display:flex;gap:8px;margin-top:6px">' +
        '<input class="input" id="finalWagerInput" type="number" min="0" max="' + cap + '" placeholder="0" value="' + esc(state.finalWagerInput) + '" />' +
        '<button class="btn-gold" data-action="submitFinalWager">Lock In</button>' +
      '</div>' +
      '<p class="muted">Pass the device to the host, then on to the next player.</p>' +
    '</div>' +
  '</div></div>';
}

function viewFinalClue(fin) {
  return '<div class="wrap"><div class="inner" style="max-width:620px;margin:0 auto">' +
    '<div style="text-align:center;color:#aab0d8;font-weight:700;font-size:14px;letter-spacing:1px">FINAL JEOPARDY</div>' +
    '<div style="text-align:center;color:' + gold + ';font-weight:900;font-size:22px;margin-bottom:14px">' + esc(fin.category) + '</div>' +
    '<div style="background:#1d2455;border-radius:16px;padding:28px 22px;font-size:21px;line-height:1.5;text-align:center;font-weight:600;min-height:90px;display:flex;align-items:center;justify-content:center">' + esc(fin.q) + '</div>' +
    '<button class="big-gold" data-action="revealFinalAnswer">Reveal Answer</button>' +
  '</div></div>';
}

function viewFinalAnswerStage(fin) {
  var rows = state.players.map(function (p, i) {
    var wager = state.finalWagers[i] || 0;
    var result = state.finalResults[i];
    var status = result
      ? '<span style="font-weight:800;color:' + (result === "correct" ? "#7ee2b0" : "#ff8aa0") + '">' + (result === "correct" ? "Correct" : "Incorrect") + '</span>'
      : '<span style="display:flex;gap:8px">' +
          '<button class="plus-btn" data-action="markFinal" data-i="' + i + '" data-correct="1">Correct</button>' +
          '<button class="minus-btn" data-action="markFinal" data-i="' + i + '" data-correct="0">Incorrect</button>' +
        '</span>';
    return '<div class="row-item">' +
      '<span class="dot" style="background:' + p.color + '"></span>' +
      '<span style="flex:1;font-weight:700">' + esc(p.name) + ' (wagered ' + wager + ')</span>' +
      '<span class="score-num" id="score-disp-f' + i + '" style="color:#aab0d8;font-weight:700;min-width:54px;text-align:right">' + p.score + '</span>' +
      status +
    '</div>';
  }).join("");
  var allMarked = state.players.every(function (p, i) { return !!state.finalResults[i]; });
  return '<div class="wrap"><div class="inner" style="max-width:620px;margin:0 auto">' +
    '<div style="text-align:center;color:#aab0d8;font-weight:700;font-size:14px;letter-spacing:1px">FINAL JEOPARDY</div>' +
    '<div class="answer-box">' + esc(fin.a) + '</div>' +
    '<p style="color:#aab0d8;text-align:center;margin:22px 0 8px;font-size:14px;font-weight:600">Mark each player correct or incorrect to apply their wager.</p>' +
    '<div style="display:flex;flex-direction:column;gap:10px">' + rows + '</div>' +
    (state.lastScoreChange ? '<button class="big-gold" style="background:#2a2f55;color:#aab0d8" data-action="undoLastScore">Undo Last Mark</button>' : '') +
    (allMarked ? '<button class="big-gold" style="background:#3da9fc;color:#04203a" data-action="finishFinal">See Final Results</button>' : '') +
  '</div></div>';
}

function viewFinal() {
  var fin = currentBoard().final;
  if (state.finalStage === "clue") return viewFinalClue(fin);
  if (state.finalStage === "answer") return viewFinalAnswerStage(fin);
  return viewFinalWager(fin);
}

function viewManagePlayers() {
  if (!state.managePlayers) return "";
  var rows = state.players.map(function (p, i) {
    if (state.editingPlayerIndex === i) {
      return '<div class="manage-row">' +
        '<input class="input" id="editNameInput" value="' + esc(state.editNameInput) + '" style="padding:8px 10px" />' +
        '<button class="edit-icon-btn" style="color:#7ee2b0" data-action="savePlayerName" data-i="' + i + '">&#10003;</button>' +
        '<button class="edit-icon-btn" style="color:#ff8aa0" data-action="cancelEditPlayerName">&#10005;</button>' +
      '</div>';
    }
    return '<div class="manage-row">' +
      '<span class="dot" style="background:' + p.color + '"></span>' +
      '<span style="flex:1;font-weight:700">' + esc(p.name) + '</span>' +
      '<span style="color:#aab0d8;font-weight:700;font-size:13px">' + p.score + '</span>' +
      '<button class="edit-icon-btn" data-action="startEditPlayerName" data-i="' + i + '">&#9998;</button>' +
      '<button class="edit-icon-btn" style="color:#ff8aa0" data-action="confirmRemovePlayerInGame" data-i="' + i + '">&times;</button>' +
    '</div>';
  }).join("");
  if (!state.players.length) rows = '<p class="muted">No players left.</p>';
  return '<div class="manage-overlay">' +
    '<div class="manage-card">' +
      '<p class="confirm-msg" style="margin-bottom:14px">Manage Players</p>' +
      rows +
      (state.editNameError ? '<p class="err">' + esc(state.editNameError) + '</p>' : '') +
      '<button class="confirm-btn-cancel" style="width:100%;margin-top:14px" data-action="closeManagePlayers">Done</button>' +
    '</div>' +
  '</div>';
}

function renderConfirm() {
  if (!state.confirm) return "";
  return '<div class="confirm-overlay">' +
    '<div class="confirm-card">' +
      '<p class="confirm-msg">' + esc(state.confirm.message) + '</p>' +
      '<div class="confirm-actions">' +
        '<button class="confirm-btn-cancel" data-action="cancelConfirm">Cancel</button>' +
        '<button class="confirm-btn-yes" data-action="confirmYes">Yes, Continue</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ---- render + events ----
function render() {
  var root = document.getElementById("root");
  var html;
  if (state.phase === "players") html = viewPlayers();
  else if (state.phase === "boards") html = state.previewBoardId ? viewBoardPreview() : viewBoards();
  else if (state.phase === "final") html = viewFinal();
  else if (state.phase === "question" && state.active) html = viewQuestion();
  else if (state.phase === "board" && isAllUsed()) {
    html = viewWin();
    if (!state.endSoundPlayed) { state.endSoundPlayed = true; sndEnd(); }
  }
  else html = viewBoard();
  if (state.phase === "board") html += viewManagePlayers();
  root.innerHTML = html + renderConfirm();

  var nameField = document.getElementById("nameInput");
  if (nameField) {
    nameField.addEventListener("input", function (e) { state.nameInput = e.target.value; });
    nameField.addEventListener("keydown", function (e) { if (e.key === "Enter") addPlayer(); });
  }
  var wagerField = document.getElementById("wagerInput");
  if (wagerField) {
    wagerField.addEventListener("input", function (e) { state.wagerInput = e.target.value; });
    wagerField.addEventListener("keydown", function (e) { if (e.key === "Enter") submitWager(); });
  }
  var finalWagerField = document.getElementById("finalWagerInput");
  if (finalWagerField) {
    finalWagerField.addEventListener("input", function (e) { state.finalWagerInput = e.target.value; });
    finalWagerField.addEventListener("keydown", function (e) { if (e.key === "Enter") submitFinalWager(); });
  }
  var editNameField = document.getElementById("editNameInput");
  if (editNameField) {
    editNameField.addEventListener("input", function (e) { state.editNameInput = e.target.value; });
    editNameField.addEventListener("keydown", function (e) { if (e.key === "Enter") savePlayerName(state.editingPlayerIndex); });
    editNameField.focus();
  }
}

document.getElementById("root").addEventListener("click", function (e) {
  var t = e.target.closest("[data-action]");
  if (!t) return;
  var action = t.getAttribute("data-action");
  if (action === "selectBoard") selectBoard(t.getAttribute("data-id"));
  else if (action === "continueToBoards") continueToBoards();
  else if (action === "editPlayers") editPlayers();
  else if (action === "switchBoard") switchBoard();
  else if (action === "newPlayers") newPlayers();
  else if (action === "toggleMenu") toggleMenu();
  else if (action === "add") addPlayer();
  else if (action === "remove") removePlayer(+t.getAttribute("data-i"));
  else if (action === "open") openQuestion(t.getAttribute("data-cat") === VIDEO ? VIDEO : +t.getAttribute("data-cat"), +t.getAttribute("data-row"));
  else if (action === "reveal") reveal();
  else if (action === "toggleAnswer") toggleAnswer();
  else if (action === "play") playVideo();
  else if (action === "plus") scoreQuestion(+t.getAttribute("data-i"), true);
  else if (action === "minus") scoreQuestion(+t.getAttribute("data-i"), false);
  else if (action === "close") closeQuestion();
  else if (action === "newRound") newRound();
  else if (action === "confirmSwitchBoard") confirmSwitchBoard();
  else if (action === "confirmNewRound") confirmNewRound();
  else if (action === "confirmNewPlayers") confirmNewPlayers();
  else if (action === "cancelConfirm") cancelConfirm();
  else if (action === "confirmYes") confirmYes();
  else if (action === "toggleTimer") toggleTimer();
  else if (action === "toggleMute") toggleMute();
  else if (action === "submitWager") submitWager();
  else if (action === "submitFinalWager") submitFinalWager();
  else if (action === "revealFinalAnswer") revealFinalAnswer();
  else if (action === "markFinal") markFinal(+t.getAttribute("data-i"), t.getAttribute("data-correct") === "1");
  else if (action === "finishFinal") finishFinal();
  else if (action === "undoLastScore") undoLastScore();
  else if (action === "previewBoard") previewBoard(t.getAttribute("data-id"));
  else if (action === "cancelPreview") cancelPreview();
  else if (action === "openManagePlayers") openManagePlayers();
  else if (action === "closeManagePlayers") closeManagePlayers();
  else if (action === "startEditPlayerName") startEditPlayerName(+t.getAttribute("data-i"));
  else if (action === "cancelEditPlayerName") cancelEditPlayerName();
  else if (action === "savePlayerName") savePlayerName(+t.getAttribute("data-i"));
  else if (action === "confirmRemovePlayerInGame") confirmRemovePlayerInGame(+t.getAttribute("data-i"));
});

render();
</script>
</body>
</html>
