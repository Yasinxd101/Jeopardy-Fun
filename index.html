<title>Anime Jeopardy</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #0b0f24;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
  a { color: #6a72a8; }
  .wrap {
    min-height: 100vh;
    padding: 64px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .inner { width: 100%; }
  .title {
    font-size: 40px; font-weight: 900; text-align: center;
    margin: 12px 0 2px; color: #ffd166; letter-spacing: 1px;
    text-shadow: 0 2px 0 #00000055;
  }
  .sub { text-align: center; color: #aab0d8; margin: 0 0 24px; }
  .card { background: #161b3d; border-radius: 16px; padding: 20px; box-shadow: 0 8px 30px #00000044; }
  .lbl { font-size: 13px; color: #aab0d8; font-weight: 600; }
  .input {
    padding: 12px 14px; border-radius: 10px; border: none; font-size: 16px;
    background: #0d1230; color: #fff; outline: none; flex: 1; width: 100%;
  }
  .btn-gold {
    padding: 0 18px; border-radius: 10px; border: none; background: #ffd166;
    color: #0b0f24; font-weight: 800; font-size: 16px; cursor: pointer;
  }
  .row-item { display: flex; align-items: center; gap: 10px; background: #0d1230; border-radius: 10px; padding: 10px 12px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .big-gold {
    width: 100%; margin-top: 18px; padding: 14px; border-radius: 12px; border: none;
    background: #ffd166; color: #0b0f24; font-weight: 900; font-size: 18px; cursor: pointer;
  }
  .big-disabled {
    width: 100%; margin-top: 18px; padding: 14px; border-radius: 12px; border: none;
    background: #2a2f55; color: #6a72a8; font-weight: 900; font-size: 18px; cursor: default;
  }
  .x-btn { background: none; border: none; color: #ff6b8a; font-size: 18px; cursor: pointer; font-weight: 700; }
  .answer-box {
    margin-top: 18px; background: #13351f; border: 2px solid #2cb67d; border-radius: 12px;
    padding: 16px 18px; text-align: center; font-size: 20px; font-weight: 800; color: #7ee2b0;
  }
  .plus-btn { background: #2cb67d; border: none; color: #04210f; font-weight: 900; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .minus-btn { background: #ff5470; border: none; color: #2a0410; font-weight: 900; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .chip { display: flex; align-items: center; gap: 7px; border-radius: 999px; padding: 7px 14px; font-weight: 800; font-size: 14px; max-width: 100%; min-width: 0; }
  .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 32vw; }
  .board-grid { display: grid; gap: 6px; }
  .cat-head {
    border-radius: 8px; padding: 8px 4px; text-align: center; font-weight: 800;
    font-size: 11px; min-height: 52px; display: flex; align-items: center; justify-content: center;
  }
  .tile {
    border: none; border-radius: 8px; padding: 16px 4px; font-weight: 900;
    font-size: 18px; min-height: 56px;
  }
  .video-frame {
    position: relative; width: 100%; padding-bottom: 56.25%;
    border-radius: 14px; overflow: hidden; background: #000;
  }
  .video-frame iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
  }
  .video-blur-overlay {
    position: absolute; inset: 0; opacity: 0; pointer-events: none;
    -webkit-backdrop-filter: blur(28px); backdrop-filter: blur(28px);
    background: rgba(8, 10, 24, 0.4); transition: opacity 0.35s ease;
  }
  .video-frame.video-blurred .video-blur-overlay { opacity: 1; }
  .clue-box {
    background: #1d2455; border-radius: 16px; padding: 28px 22px; font-size: 21px;
    line-height: 1.5; text-align: center; font-weight: 600; min-height: 90px;
    display: flex; align-items: center; justify-content: center;
  }
  .play-cover {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
    background: #080a18; color: #fff; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .play-circle {
    width: 76px; height: 76px; border-radius: 50%; background: #ffd166; color: #0b0f24;
    display: flex; align-items: center; justify-content: center; font-size: 34px; padding-left: 6px;
  }
  .err { color: #ff8aa0; font-size: 13px; font-weight: 600; margin: 8px 0 0; }
  .muted { color: #6a72a8; text-align: center; font-size: 14px; margin: 8px 0; }

  /* ---- board picker ---- */
  .boards-bg {
    min-height: 100vh; box-sizing: border-box;
    padding: 48px 20px 32px;
    display: flex; justify-content: center;
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 209, 102, 0.10), transparent 55%),
      linear-gradient(165deg, #161c42 0%, #0b0f24 55%, #060812 100%);
    position: relative;
    overflow: hidden;
  }
  .boards-bg::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at 50% 0%, #000 0%, transparent 75%);
  }
  .boards-wrap { width: 100%; max-width: 540px; position: relative; z-index: 1; }
  .boards-header { text-align: center; margin-bottom: 30px; }
  .boards-title {
    margin: 0; font-size: 42px; font-weight: 900; letter-spacing: 2px;
    color: #ffd166; text-shadow: 0 0 22px rgba(255, 209, 102, 0.45), 0 2px 0 #00000066;
  }
  .boards-subtitle { margin: 8px 0 0; color: #aab0d8; font-size: 15px; font-weight: 600; }
  .boards-grid { display: flex; flex-direction: column; gap: 16px; }
  .board-card {
    position: relative; display: flex; align-items: flex-start; gap: 16px;
    width: 100%; text-align: left; border: none; cursor: pointer;
    background: linear-gradient(155deg, #1c2252 0%, #131838 100%);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-left: 4px solid var(--accent);
    border-radius: 18px; padding: 18px;
    box-shadow: 0 10px 28px -10px rgba(0, 0, 0, 0.6);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .board-card:hover, .board-card:focus-visible {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 14px 34px -8px rgba(0, 0, 0, 0.7), 0 0 0 2px var(--accent);
  }
  .board-card:active { transform: translateY(0); filter: brightness(0.96); }
  .board-card-icon {
    flex-shrink: 0; width: 50px; height: 50px; border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: inset 0 0 0 1px var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .board-card-body { flex: 1; min-width: 0; }
  .board-card-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.2px; }
  .board-card-tagline { margin-top: 4px; font-size: 13px; color: #aab0d8; line-height: 1.4; }
  .board-card-cta { flex-shrink: 0; font-size: 13px; font-weight: 800; color: var(--accent); white-space: nowrap; margin-top: 2px; }

  /* ---- confirmation dialog ---- */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(4, 6, 16, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 50;
  }
  .confirm-card {
    width: 100%; max-width: 340px; background: #161b3d; border-radius: 16px;
    padding: 22px 20px; box-shadow: 0 14px 40px #000000aa; border: 1px solid rgba(255,255,255,0.08);
  }
  .confirm-msg { margin: 0 0 18px; font-size: 15px; line-height: 1.5; color: #fff; font-weight: 600; text-align: center; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-btn-cancel {
    flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    background: #2a2f55; color: #aab0d8; font-weight: 800; font-size: 14px;
  }
  .confirm-btn-yes {
    flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    background: #ff5470; color: #2a0410; font-weight: 800; font-size: 14px;
  }

  /* ---- per-question timer ---- */
  .timer-track { width: 100%; height: 10px; background: #1d2455; border-radius: 6px; overflow: hidden; margin: 14px 0 4px; }
  .timer-bar { height: 100%; width: 100%; background: #ffd166; animation: countdown-bar linear forwards; animation-duration: var(--timer-duration, 20s); }
  @keyframes countdown-bar { from { width: 100%; } to { width: 0%; } }

  /* ---- tile feedback ---- */
  .tile { transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease; }
  .tile:not([disabled]):hover { transform: translateY(-2px); filter: brightness(1.12); }
  .tile:not([disabled]):active { transform: scale(0.94); }

  /* ---- clue entrance ---- */
  @keyframes clueIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .clue-enter { animation: clueIn 0.32s ease-out; }

  /* ---- score tick feedback ---- */
  .score-num { display: inline-block; transition: color 0.2s ease; }
  .score-pulse-up { color: #7ee2b0 !important; animation: scorePulse 0.5s ease; }
  .score-pulse-down { color: #ff8aa0 !important; animation: scorePulse 0.5s ease; }
  @keyframes scorePulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ---- win screen ---- */
  .win-bg {
    min-height: 100vh; box-sizing: border-box; padding: 48px 20px 32px;
    display: flex; justify-content: center;
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 209, 102, 0.16), transparent 55%),
      linear-gradient(165deg, #161c42 0%, #0b0f24 55%, #060812 100%);
  }
  .win-wrap { width: 100%; max-width: 480px; animation: winPop 0.45s cubic-bezier(0.2, 1.4, 0.4, 1); }
  @keyframes winPop {
    from { opacity: 0; transform: scale(0.85) translateY(14px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .win-title {
    text-align: center; font-size: 38px; font-weight: 900; letter-spacing: 1px;
    color: #ffd166; text-shadow: 0 0 24px rgba(255, 209, 102, 0.5), 0 2px 0 #00000066;
    margin: 0 0 4px;
  }
  .win-champ-line { text-align: center; color: #fff; font-weight: 700; font-size: 16px; margin: 0 0 22px; }
  .win-board { display: flex; flex-direction: column; gap: 10px; }
  .win-row {
    display: flex; align-items: center; gap: 12px; background: #161b3d;
    border-radius: 14px; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.06);
  }
  .win-row-champ {
    background: linear-gradient(135deg, #2a2410 0%, #161b3d 70%);
    border: 1px solid #ffd166; animation: champGlow 1.8s ease-in-out infinite;
  }
  @keyframes champGlow {
    0%, 100% { box-shadow: 0 0 0px rgba(255, 209, 102, 0.0); }
    50% { box-shadow: 0 0 22px rgba(255, 209, 102, 0.55); }
  }
  .win-rank { font-weight: 900; font-size: 18px; color: #6a72a8; min-width: 26px; }
  .win-row-champ .win-rank { color: #ffd166; }
  .win-name { flex: 1; font-weight: 800; font-size: 16px; color: #fff; }
  .win-score { font-weight: 900; font-size: 18px; color: #aab0d8; }
  .win-row-champ .win-score { color: #ffd166; }
  .win-actions { display: flex; gap: 10px; margin-top: 24px; }

  /* ---- board preview ---- */
  .preview-chip {
    background: #0d1230; border: 1px solid rgba(255,255,255,0.35); border-radius: 999px;
    padding: 6px 12px; font-size: 12px; font-weight: 700; color: #aab0d8;
  }

  /* ---- manage players (mid-game) ---- */
  .manage-overlay {
    position: fixed; inset: 0; background: rgba(4, 6, 16, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 40;
  }
  .manage-card {
    width: 100%; max-width: 380px; background: #161b3d; border-radius: 16px;
    padding: 20px; box-shadow: 0 14px 40px #000000aa; border: 1px solid rgba(255,255,255,0.08);
    max-height: 80vh; overflow-y: auto;
  }
  .manage-row { display: flex; align-items: center; gap: 8px; background: #0d1230; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .edit-icon-btn { background: none; border: none; color: #aab0d8; font-size: 15px; cursor: pointer; padding: 4px 6px; }

  /* ---- settings panel (setup screen) ---- */
  .settings-panel { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

  /* ---- wheel of chaos ---- */
  .wheel-overlay {
    position: fixed; inset: 0; background: rgba(4, 6, 16, 0.78);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 60;
  }
  .wheel-card {
    width: 100%; max-width: 420px; background: #161b3d; border-radius: 16px;
    padding: 22px 20px; box-shadow: 0 14px 40px #000000aa; border: 1px solid rgba(255,255,255,0.08);
    max-height: 90vh; overflow-y: auto;
  }
  .wheel-wrap { position: relative; width: 220px; height: 220px; margin: 8px auto 0; }
  .wheel-pointer {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 11px solid transparent; border-right: 11px solid transparent;
    border-top: 18px solid #ffd166; z-index: 2;
  }
  .wheel-spinner {
    width: 220px; height: 220px; border-radius: 50%; position: relative;
    border: 6px solid #ffd166; box-shadow: 0 0 30px rgba(255, 209, 102, 0.35);
    transition: transform 2.4s cubic-bezier(0.12, 0.78, 0.15, 1);
  }
  .wheel-label {
    position: absolute; left: 50%; top: 50%; transform-origin: 0 0;
    white-space: nowrap; font-weight: 700; letter-spacing: -0.2px; line-height: 1;
    color: #f5f3ff; text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .wheel-result { margin-top: 10px; }
  .wheel-summary { text-align: center; font-weight: 800; color: #7ee2b0; margin-top: 10px; }
  .wheel-summary-bad { color: #ff8aa0; }
</style>

// ---- score tick animation ----
function tickScoreDisplay(elId, from, to) {
  var el = document.getElementById(elId);
  if (!el || from === to) return;
  el.classList.add(to >= from ? "score-pulse-up" : "score-pulse-down");
  var start = null;
  var duration = 500;
  function step(ts) {
    if (!start) start = ts;
    var progress = Math.min((ts - start) / duration, 1);
    el.textContent = Math.round(from + (to - from) * progress);
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = to;
      setTimeout(function () { el.classList.remove("score-pulse-up", "score-pulse-down"); }, 250);
    }
  }
  requestAnimationFrame(step);
}

  if (!list.length) return [];
  var slice = 360 / list.length;
  return list.map(function (o, i) {

    var end = start + slice;
    return { outcome: o, start: start, end: end, mid: (start + end) / 2 };
  });
}

    parts.push(fill + " " + s.start + "deg " + fillEnd + "deg");

function applyWheelEffect(outcome) {
  var w = state.wheel;
  var idx = w.targetIndex;
  var target = state.players[idx];
  if (target.immune && NEGATIVE_WHEEL_EFFECTS.indexOf(outcome.effect) !== -1) {
    target.immune = false;
    w.summary = target.name + " was protected by immunity — no effect.";
    w.summaryGood = true;
    return;
  }
  var old = target.score;
  var summary, good = true;
  var others = [];
  for (var i = 0; i < state.players.length; i++) { if (i !== idx) others.push(i); }

  if (outcome.effect === "gain") {
    target.score += outcome.amount;
    summary = target.name + ": +" + outcome.amount + " (" + old + " → " + target.score + ")";
  } else if (outcome.effect === "lose") {
    target.score -= outcome.amount;
    summary = target.name + ": -" + outcome.amount + " (" + old + " → " + target.score + ")";
    good = false;
  } else if (outcome.effect === "double") {
    target.score = target.score * 2;
    summary = target.name + ": " + old + " → " + target.score + " (doubled)";
    good = target.score >= old;
  } else if (outcome.effect === "halve") {
    target.score = Math.round(target.score / 2);
    summary = target.name + ": " + old + " → " + target.score + " (halved)";
    good = false;

    if (!others.length) {
      summary = "No other players to target — nothing happens.";
    } else {
      var oppIdx = others[Math.floor(Math.random() * others.length)];
      w.opponentIndex = oppIdx;
      var opp = state.players[oppIdx];
      var oppOld = opp.score;
      if (outcome.effect === "steal") {
        var amt = Math.min(outcome.amount, Math.max(opp.score, 0));
        opp.score -= amt;
        target.score += amt;
        summary = target.name + " steals " + amt + " from " + opp.name + ". (" + target.name + ": " + old + " → " + target.score + ", " + opp.name + ": " + oppOld + " → " + opp.score + ")";
      } else if (outcome.effect === "robbed") {
        var amt2 = Math.min(outcome.amount, Math.max(target.score, 0));
        target.score -= amt2;
        opp.score += amt2;
        summary = opp.name + " steals " + amt2 + " from " + target.name + ". (" + target.name + ": " + old + " → " + target.score + ", " + opp.name + ": " + oppOld + " → " + opp.score + ")";
        good = false;
      } else {
        var tmp = target.score; target.score = opp.score; opp.score = tmp;
        summary = target.name + " and " + opp.name + " swap scores! (" + target.name + ": " + old + " → " + target.score + ", " + opp.name + ": " + oppOld + " → " + opp.score + ")";
        good = target.score >= old;
      }
    }
  } else if (outcome.effect === "stealLeader") {
    if (!others.length) {
      summary = "No other players to target — nothing happens.";
    } else {
      var leaderIdx = others[0];
      others.forEach(function (i2) { if (state.players[i2].score > state.players[leaderIdx].score) leaderIdx = i2; });
      var leader = state.players[leaderIdx];
      var leaderOld = leader.score;
      var amt3 = Math.min(outcome.amount, Math.max(leader.score, 0));
      leader.score -= amt3;
      target.score += amt3;
      w.opponentIndex = leaderIdx;
      summary = target.name + " steals " + amt3 + " from leader " + leader.name + ". (" + target.name + ": " + old + " → " + target.score + ", " + leader.name + ": " + leaderOld + " → " + leader.score + ")";
    }
  } else if (outcome.effect === "giveRival") {
    if (!others.length) {
      summary = "No other players to target — nothing happens.";
    } else {
      var rivalIdx = others[Math.floor(Math.random() * others.length)];
      var rival = state.players[rivalIdx];
      var rivalOld = rival.score;
      var amt4 = Math.min(outcome.amount, Math.max(target.score, 0));
      target.score -= amt4;
      rival.score += amt4;
      w.opponentIndex = rivalIdx;
      summary = target.name + " hands " + amt4 + " points to " + rival.name + ". (" + target.name + ": " + old + " → " + target.score + ", " + rival.name + ": " + rivalOld + " → " + rival.score + ")";
      good = false;
    }
  } else if (outcome.effect === "immunity") {
    target.immune = true;
    summary = target.name + " is now immune to the next negative effect against them.";
  } else if (outcome.effect === "freeTilePick") {
    state.turn = idx;
    summary = target.name + " gets the next tile pick.";
  } else if (outcome.effect === "skipTurn") {
    target.skipNextTurn = true;
    summary = target.name + " will skip their next turn.";
    good = false;
  } else {
    summary = target.name + ": nothing happens.";
  }
  w.summary = summary;
  w.summaryGood = good;
}
function landActiveWheel() {
  var w = state.wheel;
  if (!w) return;
  w.stage = "result";
  var outcome = findSegment(w.activeWheel, w.segmentId);
  if (!outcome) { render(); return; }
  sndWheelLand(outcome, w.activeWheel);
  if (w.activeWheel === "chaos" && outcome.type === "challenge") {
    w.judged = false;
    if (outcome.trivia) w.triviaQ = BONUS_TRIVIA[Math.floor(Math.random() * BONUS_TRIVIA.length)];
  } else {
    applyWheelEffect(outcome);
    w.judged = true;
  }
  render();
}
function revealWheelTriviaAnswer() { state.wheel.showTriviaAnswer = true; render(); }
function judgeMainChallenge(pass) {
  var w = state.wheel;
  if (!w || w.activeWheel !== "chaos" || w.stage !== "result" || w.judged) return;
  var outcome = findSegment("chaos", w.segmentId);
  if (!outcome) return;
  w.chainNote = outcome.label + " — " + (pass ? "Passed" : "Failed");
  w.activeWheel = pass ? "success" : "failure";
  w.stage = "spinning";
  w.segmentId = null;
  w.rotation = 0;
  w.judged = false;
  w.summary = "";
  w.summaryGood = null;
  w.triviaQ = null;
  w.showTriviaAnswer = false;
  if (pass) sndCorrect(); else sndIncorrect();
  render();
  spinActiveWheel();
}
function removeLandedSegment() {
  var w = state.wheel;
  if (!w || w.stage !== "result" || !w.segmentId) return;
  var key = w.activeWheel;
  if (state.wheelRemoved[key].indexOf(w.segmentId) === -1) state.wheelRemoved[key].push(w.segmentId);
  render();
}
function respinWheel() {
  var w = state.wheel;
  if (!w || w.stage !== "result") return;
  if (w.activeWheel !== "chaos") {
    w.activeWheel = "chaos";
    w.chainNote = "";
  }
  w.stage = "spinning";
  w.segmentId = null;
  w.rotation = 0;
  w.judged = false;
  w.summary = "";
  w.summaryGood = null;
  w.triviaQ = null;
  w.showTriviaAnswer = false;
  render();
  spinActiveWheel();
}
function openQuestion(catKey, qIndex) {
  var key = catKey + "-" + qIndex;
  if (state.used[key]) return;
  sndSelect();
  state.active = { catKey: catKey, qIndex: qIndex };
  state.revealed = false;
  state.answerHidden = false;
  state.playing = false;
  state.wagering = isDailyDoubleTile(catKey, qIndex);
  state.wager = null;
  state.wagerInput = "";
  state.phase = "question";
  render();
}
function submitWager() {
  var player = state.players[state.turn];
  var cap = Math.max(player.score, 0);
  var amt = parseInt(state.wagerInput, 10);
  if (isNaN(amt)) amt = 0;
  amt = Math.max(0, Math.min(amt, cap));
  state.wager = amt;
  state.wagering = false;
  render();
}
function activeValue() {
  if (!state.active) return 0;
  if (state.wager != null) return state.wager;
  var board = currentBoard();
  if (state.active.catKey === VIDEO) return board.videoSlots[state.active.qIndex].value;
  return board.textBoard[state.active.catKey].questions[state.active.qIndex].value;
}
function renderOrUpdateClue() {
  if (state.phase === "question" && isActiveVideoPlaying()) updateClueFooter();
  else render();
}
function scoreQuestion(i, correct) {
  var val = activeValue();
  var old = state.players[i].score;
  var delta = correct ? val : -val;
  var next = old + delta;
  state.players[i].score = next;
  state.lastScoreChange = { playerIndex: i, delta: delta };
  if (correct) sndCorrect(); else sndIncorrect();
  renderOrUpdateClue();
  tickScoreDisplay("score-disp-" + i, old, next);
}
function undoLastScore() {
  var last = state.lastScoreChange;
  if (!last || !state.players[last.playerIndex]) return;
  var old = state.players[last.playerIndex].score;
  var next = old - last.delta;
  state.players[last.playerIndex].score = next;
  if (last.finalReset) delete state.finalResults[last.playerIndex];
  state.lastScoreChange = null;
  state.menuOpen = false;
  renderOrUpdateClue();
  tickScoreDisplay("score-disp-" + last.playerIndex, old, next);
  tickScoreDisplay("score-disp-f" + last.playerIndex, old, next);
}
function advanceTurn() {
  if (!state.players.length) { state.turn = 0; return; }
  var next = (state.turn + 1) % state.players.length;
  var loops = 0;
  while (state.players[next].skipNextTurn && loops < state.players.length) {
    state.players[next].skipNextTurn = false;
    next = (next + 1) % state.players.length;
    loops++;
  }
  state.turn = next;
}
function reveal() { sndReveal(); state.revealed = true; renderOrUpdateClue(); }
function toggleAnswer() { state.answerHidden = !state.answerHidden; renderOrUpdateClue(); }
function playVideo() { if (state.playing) return; state.playing = true; render(); }
function closeQuestion() {
  state.used[state.active.catKey + "-" + state.active.qIndex] = true;
  state.active = null;
  state.revealed = false;
  state.answerHidden = false;
  state.playing = false;
  state.wagering = false;
  state.wager = null;
  advanceTurn();
  var board = currentBoard();
  if (isAllUsed() && board.final && !state.finalDone) {
    state.finalStage = "wager";
    state.finalPlayerIndex = 0;
    state.finalWagers = {};
    state.finalWagerInput = "";
    state.finalResults = {};
    state.phase = "final";
  } else {
    state.phase = "board";
  }
  render();
}
function newRound() {
  state.menuOpen = false;
  state.used = {};
  state.players.forEach(function (p) { p.score = 0; p.immune = false; p.skipNextTurn = false; });
  state.wheelRemoved = { chaos: [], success: [], failure: [] };
  state.turn = 0;
  state.dailyDouble = pickDailyDouble(currentBoard());
  state.finalDone = false;
  state.endSoundPlayed = false;
  state.lastScoreChange = null;
  state.phase = "board";
  render();
}

// ---- final jeopardy ----
function submitFinalWager() {
  var i = state.finalPlayerIndex;
  var player = state.players[i];
  var cap = Math.max(player.score, 0);
  var amt = parseInt(state.finalWagerInput, 10);
  if (isNaN(amt)) amt = 0;
  amt = Math.max(0, Math.min(amt, cap));
  state.finalWagers[i] = amt;
  state.finalWagerInput = "";
  state.finalPlayerIndex++;
  if (state.finalPlayerIndex >= state.players.length) state.finalStage = "clue";
  render();
}
function revealFinalAnswer() { sndReveal(); state.finalStage = "answer"; render(); }
function markFinal(i, correct) {
  var wager = state.finalWagers[i] || 0;
  var old = state.players[i].score;
  var delta = correct ? wager : -wager;
  var next = old + delta;
  state.players[i].score = next;
  state.finalResults[i] = correct ? "correct" : "incorrect";
  state.lastScoreChange = { playerIndex: i, delta: delta, finalReset: true };
  if (correct) sndCorrect(); else sndIncorrect();
  render();
  tickScoreDisplay("score-disp-f" + i, old, next);
}
function finishFinal() {
  state.finalDone = true;
  state.phase = "board";
  render();
}

// ---- confirmation dialog ----
function askConfirm(message, action, payload) { state.menuOpen = false; state.confirm = { message: message, action: action, payload: payload }; render(); }
function cancelConfirm() { state.confirm = null; render(); }
function confirmYes() {
  var c = state.confirm;
  var action = c ? c.action : null;
  var payload = c ? c.payload : null;
  state.confirm = null;
  if (action === "switchBoard") switchBoard();
  else if (action === "newRound") newRound();
  else if (action === "newPlayers") newPlayers();
  else if (action === "removePlayerInGame") removePlayerInGame(payload);
  else render();
}
function confirmSwitchBoard() { askConfirm("Switch boards? Scores and used questions will reset, but your players stay the same.", "switchBoard"); }
function confirmNewRound() { askConfirm("Start a new game? All scores and used questions on this board will reset.", "newRound"); }
function confirmNewPlayers() { askConfirm("Clear all players? This removes everyone and all progress, and takes you back to the start.", "newPlayers"); }

function viewClueFooter() {

  var value = activeValue();
  var item = questionItem();

  var revealBlock;
  if (!state.revealed) {

  } else if (state.answerHidden) {

  }

  var scoreBlock = "";
  if (state.revealed && !state.answerHidden) {
    var rows = state.players.map(function (p, i) {
      return '<div class="row-item">' +
        '<span class="dot" style="background:' + p.color + '"></span>' +
        '<span style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">' + esc(p.name) + '</span>' +
        '<span class="score-num" id="score-disp-' + i + '" style="color:#aab0d8;font-weight:700;min-width:54px;text-align:right">' + p.score + '</span>' +
        '<button class="plus-btn" data-action="plus" data-i="' + i + '">+' + value + '</button>' +
        '<button class="minus-btn" data-action="minus" data-i="' + i + '">&minus;' + value + '</button>' +
      '</div>';
    }).join("");
    scoreBlock =
      '<p style="color:#aab0d8;text-align:center;margin:22px 0 8px;font-size:14px;font-weight:600">Tap a player: green adds points, red subtracts.</p>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' + rows + '</div>';
  }
  var closeBlock = state.revealed ? '<button class="big-gold" style="background:#3da9fc;color:#04203a" data-action="close">Back to Board</button>' : "";

  var hint = (isVideo && !state.revealed && state.playing) ? '<p style="color:#aab0d8;text-align:center;margin-top:12px;font-size:13px">Players shout out the anime, then reveal when they have guessed.</p>' : '';
  var timerBar = (state.timerEnabled && !state.revealed) ? '<div class="timer-track"><div class="timer-bar" style="--timer-duration:' + state.timerDuration + 's"></div></div>' : "";

  return hint + timerBar + revealBlock + scoreBlock + closeBlock;
}
function viewQuestionMenu() {

function viewWin() {

  }).join("");
  var champNames = ranked.filter(function (p) { return p.score === topScore; }).map(function (p) { return p.name; }).join(" & ");

function viewBoard() {
  var board = currentBoard();
  var categories = getCategories();

  var chips = state.players.map(function (p, i) {
    var on = i === state.turn;
    return '<div class="chip" style="background:' + (on ? p.color : "#161b3d") + ';color:' + (on ? "#0b0f24" : "#fff") + ';border:2px solid ' + (on ? "#fff" : "transparent") + '">' +
      '<span style="width:10px;height:10px;border-radius:50%;background:' + (on ? "#0b0f24" : p.color) + ';flex-shrink:0"></span>' +
      '<span class="chip-name">' + esc(p.name) + '</span>: ' + p.score +
    '</div>';
  }).join("");

  var heads = categories.map(function (col) {
    return '<div class="cat-head" style="background:' + (col.isVideo ? "#7a2f6f" : "#3a2f8f") + '">' + esc(col.category) + '</div>';
  }).join("");

  var tiles = "";
  for (var row = 0; row < 5; row++) {
    for (var ci = 0; ci < categories.length; ci++) {
      var col = categories[ci];
      var isVideoCol = !!col.isVideo;
      var catKey = isVideoCol ? VIDEO : ci;
      var key = catKey + "-" + row;
      var isUsed = !!state.used[key];
      var val = isVideoCol ? board.videoSlots[row].value : col.questions[row].value;
      var bgc = isUsed ? "#10142e" : (isVideoCol ? "#3a1d3f" : "#1d2455");
      var fgc = isUsed ? "#2a2f55" : gold;
      tiles += '<button class="tile" style="background:' + bgc + ';color:' + fgc + ';cursor:' + (isUsed ? "default" : "pointer") + '" ' +
        (isUsed ? "disabled" : 'data-action="open" data-cat="' + catKey + '" data-row="' + row + '"') + '>' +
        (isUsed ? "" : val) + '</button>';
    }
  }

  var menu = renderMenu(withUndo([
    { label: "Manage Players", action: "openManagePlayers" },
    { label: "Switch Board (Keep Players)", action: "confirmSwitchBoard" },
    { label: "New Game (Reset Scores)", action: "confirmNewRound" },
    { label: "New Players", action: "confirmNewPlayers" },
  ]));

  return menu + '<div style="min-height:100vh;padding:' + (state.menuOpen ? "160px" : "16px") + ' 12px 16px"><div style="max-width:820px;margin:0 auto">' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px">' + chips + '</div>' +
    '<div style="text-align:center;color:' + gold + ';font-weight:800;font-size:14px;margin-bottom:14px">' +
      esc(state.players[state.turn].name) + "'s pick" +
    '</div>' +
    (state.wheelOfChaosEnabled ?
      '<div style="text-align:center;margin-bottom:14px">' +
        '<button class="btn-gold" style="padding:10px 22px;border-radius:999px" data-action="openWheel">Spin the Wheel of Chaos</button>' +
      '</div>'
    : "") +
    '<div class="board-grid" style="grid-template-columns:repeat(' + categories.length + ',1fr)">' + heads + tiles + '</div>' +
  '</div></div>';
}

function viewFinal() {

      '<span style="color:#aab0d8;font-weight:700;font-size:13px">' + p.score + '</span>' +

function wheelSummaryHtml(w) {
  return '<p class="wheel-summary' + (w.summaryGood === false ? " wheel-summary-bad" : "") + '">' + esc(w.summary) + '</p>';
}
function wheelActionsRow() {
  return '<div class="confirm-actions" style="margin-top:12px">' +
    '<button class="confirm-btn-cancel" style="flex:1" data-action="removeLandedSegment">Remove This Option</button>' +
    '<button class="confirm-btn-cancel" style="flex:1" data-action="respinWheel">Respin</button>' +
  '</div>';
}
function wheelOutcomeControls(w, outcome) {
  if (!outcome) {
    return '<button class="big-gold" data-action="closeWheel">Done</button>';
  }
  return (w.summary ? wheelSummaryHtml(w) : "") +
    wheelActionsRow() +
    '<button class="big-gold" data-action="closeWheel">Done</button>';
}
function viewWheelChallengeClue(w, outcome) {
  var target = state.players[w.targetIndex];
  var triviaBlock = "";
  if (outcome.trivia && w.triviaQ) {
    triviaBlock = '<div class="answer-box" style="margin-top:14px">' + esc(w.triviaQ.q) + '</div>' +
      (w.showTriviaAnswer
        ? '<p style="text-align:center;color:#aab0d8;margin-top:8px;font-weight:700">' + esc(w.triviaQ.a) + '</p>'
        : '<button class="confirm-btn-cancel" style="width:100%;margin-top:10px" data-action="revealWheelTriviaAnswer">Reveal Answer</button>');
  }
  return '<p class="muted" style="margin-bottom:2px">Chaos Wheel Challenge</p>' +
    '<p class="confirm-msg" style="margin-bottom:6px">Targeting: <span style="color:' + gold + '">' + esc(target.name) + '</span></p>' +
    '<div class="clue-box" style="margin-top:6px;flex-direction:column;gap:10px">' +
      '<div style="font-weight:900;color:' + gold + ';font-size:18px">' + esc(outcome.label) + '</div>' +
      '<div>' + esc(outcome.desc) + '</div>' +
    '</div>' +
    triviaBlock +
    '<div style="display:flex;gap:10px;margin-top:14px">' +
      '<button class="plus-btn" style="flex:1;padding:14px;font-size:16px" data-action="judgeMainChallenge" data-pass="1">Right</button>' +
      '<button class="minus-btn" style="flex:1;padding:14px;font-size:16px" data-action="judgeMainChallenge" data-pass="0">Wrong</button>' +
    '</div>';
}
function viewWheel() {
  var w = state.wheel;
  if (!w) return "";
  var segs = wheelSegments(w.activeWheel);
  var gradient = segs.length ? wheelGradient(segs) : "#1d2455 0deg 360deg";
  var labelFontSize = segs.length > 14 ? 9 : segs.length > 9 ? 10 : segs.length > 5 ? 11.5 : 13;
  var labelsHtml = segs.map(function (s) {
    var rot = s.mid - 90;
    var text = s.outcome.short || s.outcome.label;
    return '<span class="wheel-label" style="font-size:' + labelFontSize + 'px;transform:rotate(' + rot + 'deg) translate(16px,-50%)">' + esc(text) + '</span>';
  }).join("");
  var wheelHtml = '<div class="wheel-pointer"></div>' +
    '<div class="wheel-spinner" id="wheelSpinner" style="background:conic-gradient(' + gradient + ');transform:rotate(' + (w.rotation || 0) + 'deg)">' + labelsHtml + '</div>';

  var titleLine = '<p class="muted" style="margin-bottom:2px">' + WHEEL_TITLES[w.activeWheel] + '</p>';
  var chainLine = w.chainNote ? '<p class="muted" style="margin-bottom:2px;color:#aab0d8">' + esc(w.chainNote) + '</p>' : "";

  var body;
  if (w.stage === "choose") {
    body = '<p class="confirm-msg">Who gets targeted by the Wheel of Chaos?</p>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' +
        '<button class="big-gold" style="margin-top:0" data-action="chooseWheelTarget" data-mode="current">Current Player (' + esc(state.players[state.turn].name) + ')</button>' +
        '<button class="big-gold" style="margin-top:0;background:#3da9fc;color:#04203a" data-action="chooseWheelTarget" data-mode="random">Random Player</button>' +
        '<button class="confirm-btn-cancel" data-action="closeWheel">Cancel</button>' +
      '</div>';
  } else {
    var target = state.players[w.targetIndex];
    var targetLine = '<p class="confirm-msg" style="margin-bottom:6px">Targeting: <span style="color:' + gold + '">' + esc(target.name) + '</span></p>';
    if (w.stage === "spinning") {
      body = titleLine + chainLine + targetLine + '<div class="wheel-wrap">' + wheelHtml + '</div>' + '<p class="muted" style="margin-top:18px">Spinning...</p>';
    } else {
      var outcome = w.segmentId ? findSegment(w.activeWheel, w.segmentId) : null;
      if (outcome && w.activeWheel === "chaos" && outcome.type === "challenge" && !w.judged) {
        body = viewWheelChallengeClue(w, outcome);
      } else {
        body = titleLine + chainLine + targetLine + '<div class="wheel-wrap">' + wheelHtml + '</div>' +
          '<div class="wheel-result">' +
            (outcome
              ? '<div style="text-align:center;font-weight:900;font-size:22px;color:' + gold + ';margin-top:6px">' + esc(outcome.label) + '</div>' +
                '<p style="text-align:center;color:#aab0d8;margin-top:6px;font-size:15px">' + esc(outcome.desc) + '</p>'
              : '<p class="muted" style="text-align:center">No options left on this wheel.</p>') +
            wheelOutcomeControls(w, outcome) +
          '</div>';
      }
    }
  }
  return '<div class="wheel-overlay"><div class="wheel-card">' + body + '</div></div>';
}

function renderConfirm() {
  if (!state.confirm) return "";
  return '<div class="confirm-overlay">' +
    '<div class="confirm-card">' +
      '<p class="confirm-msg">' + esc(state.confirm.message) + '</p>' +
      '<div class="confirm-actions">' +
        '<button class="confirm-btn-cancel" data-action="cancelConfirm">Cancel</button>' +
        '<button class="confirm-btn-yes" data-action="confirmYes">Yes, Continue</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ---- render + events ----
function render() {
  var root = document.getElementById("root");
  var html;
  if (state.phase === "players") html = viewPlayers();
  else if (state.phase === "boards") html = state.previewBoardId ? viewBoardPreview() : viewBoards();
  else if (state.phase === "final") html = viewFinal();
  else if (state.phase === "question" && state.active) html = viewQuestion();
  else if (state.phase === "board" && isAllUsed()) {
    html = viewWin();
    if (!state.endSoundPlayed) { state.endSoundPlayed = true; sndEnd(); }
  }
  else html = viewBoard();
  if (state.phase === "board") html += viewManagePlayers() + viewWheel();
  root.innerHTML = html + renderConfirm();

  var nameField = document.getElementById("nameInput");
  if (nameField) {
    nameField.addEventListener("input", function (e) { state.nameInput = e.target.value; });
    nameField.addEventListener("keydown", function (e) { if (e.key === "Enter") addPlayer(); });
  }
  var wagerField = document.getElementById("wagerInput");
  if (wagerField) {
    wagerField.addEventListener("input", function (e) { state.wagerInput = e.target.value; });
    wagerField.addEventListener("keydown", function (e) { if (e.key === "Enter") submitWager(); });
  }
  var finalWagerField = document.getElementById("finalWagerInput");
  if (finalWagerField) {
    finalWagerField.addEventListener("input", function (e) { state.finalWagerInput = e.target.value; });
    finalWagerField.addEventListener("keydown", function (e) { if (e.key === "Enter") submitFinalWager(); });
  }
  var editNameField = document.getElementById("editNameInput");
  if (editNameField) {
    editNameField.addEventListener("input", function (e) { state.editNameInput = e.target.value; });
    editNameField.addEventListener("keydown", function (e) { if (e.key === "Enter") savePlayerName(state.editingPlayerIndex); });
    editNameField.focus();
  }
}

document.getElementById("root").addEventListener("click", function (e) {
  var t = e.target.closest("[data-action]");
  if (!t) return;
  var action = t.getAttribute("data-action");
  if (action === "selectBoard") selectBoard(t.getAttribute("data-id"));
  else if (action === "continueToBoards") continueToBoards();
  else if (action === "editPlayers") editPlayers();
  else if (action === "switchBoard") switchBoard();
  else if (action === "newPlayers") newPlayers();
  else if (action === "toggleMenu") toggleMenu();
  else if (action === "add") addPlayer();
  else if (action === "remove") removePlayer(+t.getAttribute("data-i"));
  else if (action === "open") openQuestion(t.getAttribute("data-cat") === VIDEO ? VIDEO : +t.getAttribute("data-cat"), +t.getAttribute("data-row"));
  else if (action === "reveal") reveal();
  else if (action === "toggleAnswer") toggleAnswer();
  else if (action === "play") playVideo();
  else if (action === "plus") scoreQuestion(+t.getAttribute("data-i"), true);
  else if (action === "minus") scoreQuestion(+t.getAttribute("data-i"), false);
  else if (action === "close") closeQuestion();
  else if (action === "newRound") newRound();
  else if (action === "confirmSwitchBoard") confirmSwitchBoard();
  else if (action === "confirmNewRound") confirmNewRound();
  else if (action === "confirmNewPlayers") confirmNewPlayers();
  else if (action === "cancelConfirm") cancelConfirm();
  else if (action === "confirmYes") confirmYes();
  else if (action === "toggleTimer") toggleTimer();
  else if (action === "incTimerDuration") adjustTimerDuration(5);
  else if (action === "decTimerDuration") adjustTimerDuration(-5);
  else if (action === "toggleMute") toggleMute();
  else if (action === "submitWager") submitWager();
  else if (action === "submitFinalWager") submitFinalWager();
  else if (action === "revealFinalAnswer") revealFinalAnswer();
  else if (action === "markFinal") markFinal(+t.getAttribute("data-i"), t.getAttribute("data-correct") === "1");
  else if (action === "finishFinal") finishFinal();
  else if (action === "undoLastScore") undoLastScore();
  else if (action === "previewBoard") previewBoard(t.getAttribute("data-id"));
  else if (action === "cancelPreview") cancelPreview();
  else if (action === "openManagePlayers") openManagePlayers();
  else if (action === "closeManagePlayers") closeManagePlayers();
  else if (action === "startEditPlayerName") startEditPlayerName(+t.getAttribute("data-i"));
  else if (action === "cancelEditPlayerName") cancelEditPlayerName();
  else if (action === "savePlayerName") savePlayerName(+t.getAttribute("data-i"));
  else if (action === "confirmRemovePlayerInGame") confirmRemovePlayerInGame(+t.getAttribute("data-i"));
  else if (action === "toggleSettings") toggleSettings();
  else if (action === "toggleWheelOfChaos") toggleWheelOfChaos();
  else if (action === "openWheel") openWheel();
  else if (action === "closeWheel") closeWheel();
  else if (action === "chooseWheelTarget") chooseWheelTarget(t.getAttribute("data-mode"));
  else if (action === "revealWheelTriviaAnswer") revealWheelTriviaAnswer();
  else if (action === "judgeMainChallenge") judgeMainChallenge(t.getAttribute("data-pass") === "1");
  else if (action === "removeLandedSegment") removeLandedSegment();
  else if (action === "respinWheel") respinWheel();
});

render();
</script>
