<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Anime Jeopardy</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #0b0f24;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
  a { color: #6a72a8; }
  .wrap {
    min-height: 100vh;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .inner { width: 100%; }
  .title {
    font-size: 40px; font-weight: 900; text-align: center;
    margin: 12px 0 2px; color: #ffd166; letter-spacing: 1px;
    text-shadow: 0 2px 0 #00000055;
  }
  .sub { text-align: center; color: #aab0d8; margin: 0 0 24px; }
  .card { background: #161b3d; border-radius: 16px; padding: 20px; box-shadow: 0 8px 30px #00000044; }
  .lbl { font-size: 13px; color: #aab0d8; font-weight: 600; }
  .input {
    padding: 12px 14px; border-radius: 10px; border: none; font-size: 16px;
    background: #0d1230; color: #fff; outline: none; flex: 1; width: 100%;
  }
  .btn-gold {
    padding: 0 18px; border-radius: 10px; border: none; background: #ffd166;
    color: #0b0f24; font-weight: 800; font-size: 16px; cursor: pointer;
  }
  .row-item { display: flex; align-items: center; gap: 10px; background: #0d1230; border-radius: 10px; padding: 10px 12px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .big-gold {
    width: 100%; margin-top: 18px; padding: 14px; border-radius: 12px; border: none;
    background: #ffd166; color: #0b0f24; font-weight: 900; font-size: 18px; cursor: pointer;
  }
  .big-disabled {
    width: 100%; margin-top: 18px; padding: 14px; border-radius: 12px; border: none;
    background: #2a2f55; color: #6a72a8; font-weight: 900; font-size: 18px; cursor: default;
  }
  .x-btn { background: none; border: none; color: #ff6b8a; font-size: 18px; cursor: pointer; font-weight: 700; }
  .answer-box {
    margin-top: 18px; background: #13351f; border: 2px solid #2cb67d; border-radius: 12px;
    padding: 16px 18px; text-align: center; font-size: 20px; font-weight: 800; color: #7ee2b0;
  }
  .plus-btn { background: #2cb67d; border: none; color: #04210f; font-weight: 900; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .minus-btn { background: #ff5470; border: none; color: #2a0410; font-weight: 900; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .chip { display: flex; align-items: center; gap: 7px; border-radius: 999px; padding: 7px 14px; font-weight: 800; font-size: 14px; }
  .board-grid { display: grid; gap: 6px; }
  .cat-head {
    border-radius: 8px; padding: 8px 4px; text-align: center; font-weight: 800;
    font-size: 11px; min-height: 52px; display: flex; align-items: center; justify-content: center;
  }
  .tile {
    border: none; border-radius: 8px; padding: 16px 4px; font-weight: 900;
    font-size: 18px; min-height: 56px;
  }
  .video-frame {
    position: relative; width: 100%; padding-bottom: 56.25%;
    border-radius: 14px; overflow: hidden; background: #000;
  }
  .video-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .strip-top { position: absolute; top: 0; left: 0; right: 0; height: 64px; background: #000; pointer-events: none; }
  .play-cover {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
    background: #080a18; color: #fff; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .play-circle {
    width: 76px; height: 76px; border-radius: 50%; background: #ffd166; color: #0b0f24;
    display: flex; align-items: center; justify-content: center; font-size: 34px; padding-left: 6px;
  }
  .err { color: #ff8aa0; font-size: 13px; font-weight: 600; margin: 8px 0 0; }
  .muted { color: #6a72a8; text-align: center; font-size: 14px; margin: 8px 0; }

  /* ---- board picker ---- */
  .boards-bg {
    min-height: 100vh; box-sizing: border-box;
    padding: 48px 20px 32px;
    display: flex; justify-content: center;
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 209, 102, 0.10), transparent 55%),
      linear-gradient(165deg, #161c42 0%, #0b0f24 55%, #060812 100%);
    position: relative;
    overflow: hidden;
  }
  .boards-bg::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at 50% 0%, #000 0%, transparent 75%);
  }
  .boards-wrap { width: 100%; max-width: 540px; position: relative; z-index: 1; }
  .boards-header { text-align: center; margin-bottom: 30px; }
  .boards-title {
    margin: 0; font-size: 42px; font-weight: 900; letter-spacing: 2px;
    color: #ffd166; text-shadow: 0 0 22px rgba(255, 209, 102, 0.45), 0 2px 0 #00000066;
  }
  .boards-subtitle { margin: 8px 0 0; color: #aab0d8; font-size: 15px; font-weight: 600; }
  .boards-grid { display: flex; flex-direction: column; gap: 16px; }
  .board-card {
    position: relative; display: flex; align-items: center; gap: 16px;
    width: 100%; text-align: left; border: none; cursor: pointer;
    background: linear-gradient(155deg, #1c2252 0%, #131838 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-left: 4px solid var(--accent);
    border-radius: 18px; padding: 20px 18px 24px;
    box-shadow: 0 10px 28px -10px rgba(0, 0, 0, 0.6);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .board-card:hover, .board-card:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 14px 34px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px var(--accent);
  }
  .board-card:active { transform: translateY(0); filter: brightness(0.96); }
  .board-card-icon {
    flex-shrink: 0; width: 50px; height: 50px; border-radius: 14px;
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .board-card-body { flex: 1; min-width: 0; }
  .board-card-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.2px; }
  .board-card-tagline { margin-top: 4px; font-size: 13px; color: #aab0d8; line-height: 1.4; }
  .board-card-cta { flex-shrink: 0; font-size: 13px; font-weight: 800; color: var(--accent); white-space: nowrap; }
  .board-card-date { position: absolute; bottom: 7px; right: 18px; font-size: 10px; color: #5a6090; font-weight: 600; }

  /* ---- confirmation dialog ---- */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(4, 6, 16, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 50;
  }
  .confirm-card {
    width: 100%; max-width: 340px; background: #161b3d; border-radius: 16px;
    padding: 22px 20px; box-shadow: 0 14px 40px #000000aa; border: 1px solid rgba(255,255,255,0.08);
  }
  .confirm-msg { margin: 0 0 18px; font-size: 15px; line-height: 1.5; color: #fff; font-weight: 600; text-align: center; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-btn-cancel {
    flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    background: #2a2f55; color: #aab0d8; font-weight: 800; font-size: 14px;
  }
  .confirm-btn-yes {
    flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    background: #ff5470; color: #2a0410; font-weight: 800; font-size: 14px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ===========================================================================
// ANIME JEOPARDY  (standalone HTML, plain JS, real YouTube embeds)
// ===========================================================================

var ANIME_TEXT_BOARD = [
  { category: "Heroes & Protagonists", questions: [
    { value: 100, q: "This orange-clad ninja dreams of becoming Hokage.", a: "Who is Naruto Uzumaki?" },
    { value: 200, q: "This pirate captain wears a straw hat and stretches like rubber.", a: "Who is Monkey D. Luffy?" },
    { value: 300, q: "This Death Note protagonist writes names in a notebook to reshape the world.", a: "Who is Light Yagami?" },
    { value: 400, q: "In Mob Psycho 100, this is the real name of the esper nicknamed Mob.", a: "Who is Shigeo Kageyama?" },
    { value: 500, q: "This Fullmetal Alchemist protagonist loses an arm and a leg in a forbidden human transmutation.", a: "Who is Edward Elric?" },
  ]},
  { category: "Villains & Rivals", questions: [
    { value: 100, q: "Vegeta first arrives on Earth as a member of this warrior alien race.", a: "What is a Saiyan?" },
    { value: 200, q: "This Naruto masked figure seeks to capture all nine tailed beasts.", a: "Who is Madara / Obito?" },
    { value: 300, q: "This card-loving clown assassin in Hunter x Hunter is obsessed with strong opponents.", a: "Who is Hisoka?" },
    { value: 400, q: "In Fairy Tail, this lightning Dragon Slayer fights Jura in a fan-favorite Grand Magic Games clash.", a: "Who is Laxus Dreyar?" },
    { value: 500, q: "This Code Geass lead commands the power of Geass under the masked identity Zero.", a: "Who is Lelouch vi Britannia?" },
  ]},
  { category: "Powers & Systems", questions: [
    { value: 100, q: "In Naruto, this eye technique is the bloodline trait of the Uchiha clan.", a: "What is the Sharingan?" },
    { value: 200, q: "In My Hero Academia, this is the general term for a person's superpower.", a: "What is a Quirk?" },
    { value: 300, q: "In JoJo's Bizarre Adventure, these manifested spirit-fighters are summoned by their users.", a: "What are Stands?" },
    { value: 400, q: "In Hunter x Hunter, this is the system of controlling one's life energy or aura.", a: "What is Nen?" },
    { value: 500, q: "In Jujutsu Kaisen, characters trap foes inside these innate technique-amplifying domains.", a: "What is a Domain Expansion?" },
  ]},
  { category: "Deep Cuts", questions: [
    { value: 100, q: "This series follows a yellow electric mouse and his trainer Ash.", a: "What is Pokemon?" },
    { value: 200, q: "This thriller traps students in deadly killing games run by a bear named Monokuma.", a: "What is Danganronpa?" },
    { value: 300, q: "This Trigun gunman carries a 60-billion double-dollar bounty.", a: "Who is Vash the Stampede?" },
    { value: 400, q: "This Monogatari protagonist is a former vampire who helps girls afflicted by oddities.", a: "Who is Koyomi Araragi?" },
    { value: 500, q: "This 1998 series follows bounty hunters Spike, Jet, Faye, and Ein aboard the Bebop.", a: "What is Cowboy Bebop?" },
  ]},
];

// Official artist/label uploads (embedding allowed). Scaled by recognizability.
var ANIME_VIDEO_SLOTS = [
  { value: 100, id: "x1FV6IrjZCY", a: 'What is Demon Slayer? ("Gurenge" by LiSA)' },
  { value: 200, id: "ZRtdQ81jPUQ", a: 'What is Oshi no Ko? ("Idol" by YOASOBI)' },
  { value: 300, id: "NMA_isZYsYQ", a: 'What is Chainsaw Man? ("KICK BACK" by Kenshi Yonezu)' },
  { value: 400, id: "1tk1pqwrOys", a: 'What is Jujutsu Kaisen? ("Kaikai Kitan" by Eve)' },
  { value: 500, id: "FT0GKCuSaW0", a: 'What is Ranking of Kings? ("Hadaka no Yuusha" by Vaundy)' },
];

var ONEPIECE_TEXT_BOARD = [
  { category: "Straw Hat Crew", questions: [
    { value: 100, q: "This captain wears a straw hat and dreams of becoming Pirate King.", a: "Who is Monkey D. Luffy?" },
    { value: 200, q: "This swordsman aims to become the world's greatest swordsman and fights with three blades.", a: "Who is Roronoa Zoro?" },
    { value: 300, q: "This navigator of the Straw Hats has a talent for cartography and a love of money.", a: "Who is Nami?" },
    { value: 400, q: "This sniper of the crew claims to have 8,000 men under his command back home.", a: "Who is Usopp?" },
    { value: 500, q: "This skeleton musician, despite having no skin, often jokes about wanting to see panties.", a: "Who is Brook?" },
  ]},
  { category: "Villains & Warlords", questions: [
    { value: 100, q: "This former Whitebeard Pirates commander killed his own captain and took his place as a Yonko.", a: "Who is Marshall D. Teach (Blackbeard)?" },
    { value: 200, q: "This former Warlord leads the Donquixote Pirates and secretly orchestrated Dressrosa's takeover.", a: "Who is Donquixote Doflamingo?" },
    { value: 300, q: "This Yonko captains the Big Mom Pirates and can animate anything alive using her Devil Fruit power.", a: "Who is Charlotte Linlin (Big Mom)?" },
    { value: 400, q: "This former Warlord, also called \"Hawk-Eyes,\" wields the black blade Yoru.", a: "Who is Dracule Mihawk?" },
    { value: 500, q: "This Yonko rules over Wano Country and is known as the \"Strongest Creature.\"", a: "Who is Kaido?" },
  ]},
  { category: "Devil Fruits & Powers", questions: [
    { value: 100, q: "This is the general term for the mysterious fruits that grant superhuman powers at the cost of the ability to swim.", a: "What is a Devil Fruit?" },
    { value: 200, q: "Luffy's Devil Fruit was eventually revealed to actually be this mythical Zoan fruit, not a simple rubber fruit.", a: "What is the Hito Hito no Mi, Model: Nika?" },
    { value: 300, q: "This rare class of Devil Fruit grants control over a natural element like fire, ice, or magma.", a: "What is a Logia?" },
    { value: 400, q: "Used by Trafalgar Law, this Devil Fruit power creates a spherical territory where he can manipulate anything inside it.", a: "What is the Ope Ope no Mi (Room)?" },
    { value: 500, q: "This type of Haki lets its user sense the presence and emotions of others, even predicting attacks.", a: "What is Observation Haki (Kenbunshoku Haki)?" },
  ]},
  { category: "World & Lore", questions: [
    { value: 100, q: "This is the ultimate treasure left behind by the Pirate King, sought by pirates across the world.", a: "What is the One Piece?" },
    { value: 200, q: "This brutal sea route is home to the most dangerous pirates and the four Yonko.", a: "What is the Grand Line?" },
    { value: 300, q: "This organization of officers and admirals enforces World Government law across the seas.", a: "What is the Marines?" },
    { value: 400, q: "This event, the execution of the Pirate King 22 years before the story begins, sparked the Golden Age of Pirates.", a: "What is the execution of Gol D. Roger?" },
    { value: 500, q: "Scholars trained at Ohara, including Nico Robin, can read this mysterious ancient script.", a: "What is Poneglyph script?" },
  ]},
];

var BOARDS = [
  { id: "anime", name: "Anime Jeopardy", date: "2026-06-20", icon: "🎌", accent: "#a786df",
    tagline: "Heroes, villains, powers, and real opening songs.",
    textBoard: ANIME_TEXT_BOARD, videoSlots: ANIME_VIDEO_SLOTS, videoCategory: "Name That Opening" },
  { id: "onepiece", name: "One Piece Jeopardy", date: "2026-06-27", icon: "🏴‍☠️", accent: "#3da9fc",
    tagline: "Straw Hats, Warlords, Devil Fruits, and Grand Line lore.",
    textBoard: ONEPIECE_TEXT_BOARD, videoSlots: null },
];

var PLAYER_COLORS = ["#ff5470", "#3da9fc", "#2cb67d", "#ff8906", "#a786df", "#f25f4c"];
var VIDEO = "VIDEO";
var gold = "#ffd166";

// ---- state ----
var state = {
  phase: "players",      // players | boards | board | question
  menuOpen: false,
  boardId: null,
  players: [],          // {name, score, color}
  nameInput: "",
  nameError: "",
  turn: 0,
  active: null,         // {catKey, qIndex}
  revealed: false,
  answerHidden: false,
  playing: false,
  used: {},
  confirm: null,        // {message, action}
};

function currentBoard() {
  return BOARDS.filter(function (b) { return b.id === state.boardId; })[0];
}
function getCategories() {
  var board = currentBoard();
  var cats = board.textBoard.slice();
  if (board.videoSlots) cats = cats.concat([{ category: board.videoCategory || "Name That Opening", isVideo: true }]);
  return cats;
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function hexToRgba(hex, alpha) {
  var h = hex.replace("#", "");
  var r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

// ---- actions ----
function toggleMenu() { state.menuOpen = !state.menuOpen; render(); }
function addPlayer() {
  var name = state.nameInput.trim();
  if (!name || state.players.length >= 6) return;
  var dupe = state.players.some(function (p) { return p.name.toLowerCase() === name.toLowerCase(); });
  if (dupe) { state.nameError = '"' + name + '" is already taken. Pick a different name.'; render(); return; }
  state.players.push({ name: name, score: 0, color: PLAYER_COLORS[state.players.length] });
  state.nameInput = "";
  state.nameError = "";
  render();
}
function removePlayer(i) { state.players.splice(i, 1); render(); }
function continueToBoards() { if (state.players.length) { state.phase = "boards"; render(); } }
function editPlayers() { state.menuOpen = false; state.phase = "players"; render(); }
function selectBoard(id) {
  state.boardId = id;
  state.used = {};
  state.turn = 0;
  state.players.forEach(function (p) { p.score = 0; });
  state.menuOpen = false;
  state.phase = "board";
  render();
}
function switchBoard() {
  state.menuOpen = false;
  state.boardId = null;
  state.used = {};
  state.turn = 0;
  state.players.forEach(function (p) { p.score = 0; });
  state.phase = "boards";
  render();
}
function newPlayers() {
  state.menuOpen = false;
  state.players = [];
  state.boardId = null;
  state.turn = 0;
  state.active = null;
  state.revealed = false;
  state.answerHidden = false;
  state.playing = false;
  state.used = {};
  state.nameError = "";
  state.phase = "players";
  render();
}
function openQuestion(catKey, qIndex) {
  var key = catKey + "-" + qIndex;
  if (state.used[key]) return;
  state.active = { catKey: catKey, qIndex: qIndex };
  state.revealed = false;
  state.answerHidden = false;
  state.playing = false;
  state.phase = "question";
  render();
}
function activeValue() {
  if (!state.active) return 0;
  var board = currentBoard();
  if (state.active.catKey === VIDEO) return board.videoSlots[state.active.qIndex].value;
  return board.textBoard[state.active.catKey].questions[state.active.qIndex].value;
}
function scoreQuestion(i, correct) {
  var val = activeValue();
  state.players[i].score += correct ? val : -val;
  render();
}
function reveal() { state.revealed = true; render(); }
function toggleAnswer() { state.answerHidden = !state.answerHidden; render(); }
function playVideo() { state.playing = true; render(); }
function closeQuestion() {
  state.used[state.active.catKey + "-" + state.active.qIndex] = true;
  state.active = null;
  state.revealed = false;
  state.answerHidden = false;
  state.playing = false;
  state.turn = (state.turn + 1) % state.players.length;
  state.phase = "board";
  render();
}
function newRound() {
  state.menuOpen = false;
  state.used = {};
  state.players.forEach(function (p) { p.score = 0; });
  state.turn = 0; state.phase = "board"; render();
}

// ---- confirmation dialog ----
function askConfirm(message, action) { state.menuOpen = false; state.confirm = { message: message, action: action }; render(); }
function cancelConfirm() { state.confirm = null; render(); }
function confirmYes() {
  var action = state.confirm ? state.confirm.action : null;
  state.confirm = null;
  if (action === "switchBoard") switchBoard();
  else if (action === "newRound") newRound();
  else if (action === "newPlayers") newPlayers();
  else render();
}
function confirmSwitchBoard() { askConfirm("Switch boards? Scores and used questions will reset, but your players stay the same.", "switchBoard"); }
function confirmNewRound() { askConfirm("Start a new game? All scores and used questions on this board will reset.", "newRound"); }
function confirmNewPlayers() { askConfirm("Clear all players? This removes everyone and all progress, and takes you back to the start.", "newPlayers"); }

// ---- views ----
function renderMenu(items) {
  var btn = '<button data-action="toggleMenu" aria-label="Menu" style="position:fixed;top:14px;right:14px;width:42px;height:42px;border-radius:10px;border:none;background:#161b3d;color:#fff;font-size:20px;cursor:pointer;z-index:30">&#9776;</button>';
  if (!state.menuOpen) return btn;
  var rows = items.map(function (it) {
    return '<button data-action="' + it.action + '" style="display:block;width:100%;text-align:left;padding:12px 14px;border:none;background:none;color:#fff;font-weight:700;font-size:14px;cursor:pointer;border-radius:8px">' + esc(it.label) + '</button>';
  }).join("");
  var panel = '<div style="position:fixed;top:60px;right:14px;background:#161b3d;border-radius:12px;padding:6px;box-shadow:0 8px 30px #00000066;z-index:30;min-width:220px">' + rows + '</div>';
  return btn + panel;
}

function viewBoards() {
  var cards = BOARDS.map(function (b) {
    return '<button class="board-card" style="--accent:' + b.accent + '" data-action="selectBoard" data-id="' + esc(b.id) + '">' +
      '<div class="board-card-icon" style="background:' + hexToRgba(b.accent, 0.18) + '">' + b.icon + '</div>' +
      '<div class="board-card-body">' +
        '<div class="board-card-title">' + esc(b.name) + '</div>' +
        '<div class="board-card-tagline">' + esc(b.tagline) + '</div>' +
      '</div>' +
      '<div class="board-card-cta">PLAY &rarr;</div>' +
      '<div class="board-card-date">' + esc(b.date) + '</div>' +
    '</button>';
  }).join("");

  var menu = renderMenu([
    { label: "Edit Players", action: "editPlayers" },
    { label: "New Players", action: "confirmNewPlayers" },
  ]);

  return menu + '<div class="boards-bg"><div class="boards-wrap">' +
    '<div class="boards-header">' +
      '<h1 class="boards-title">JEOPARDY</h1>' +
      '<p class="boards-subtitle">Choose a board to start the game</p>' +
    '</div>' +
    '<div class="boards-grid">' + cards + '</div>' +
  '</div></div>';
}

function viewPlayers() {
  var playerRows = state.players.map(function (p, i) {
    return '<div class="row-item">' +
      '<span class="dot" style="background:' + p.color + '"></span>' +
      '<span style="flex:1;font-weight:600">' + esc(p.name) + '</span>' +
      '<button class="x-btn" data-action="remove" data-i="' + i + '">&times;</button>' +
    '</div>';
  }).join("");
  if (!state.players.length) playerRows = '<p class="muted">No players yet. Add up to 6.</p>';

  return '<div class="wrap"><div class="inner" style="max-width:480px;margin:0 auto">' +
    '<h1 class="title">JEOPARDY</h1>' +
    '<p class="sub">Add players, then pick a board to play.</p>' +
    '<div class="card">' +
      '<label class="lbl">Player name</label>' +
      '<div style="display:flex;gap:8px;margin-top:6px">' +
        '<input class="input" id="nameInput" placeholder="Type a name..." value="' + esc(state.nameInput) + '" />' +
        '<button class="btn-gold" data-action="add">Add</button>' +
      '</div>' +
      (state.nameError ? '<p class="err">' + esc(state.nameError) + '</p>' : '') +
      '<div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">' + playerRows + '</div>' +
      '<button class="' + (state.players.length ? 'big-gold' : 'big-disabled') + '" data-action="continueToBoards">Pick a Board</button>' +
    '</div>' +
  '</div></div>';
}

function viewQuestion() {
  var board = currentBoard();
  var isVideo = state.active.catKey === VIDEO;
  var value = activeValue();
  var catName = isVideo ? (board.videoCategory || "Name That Opening") : board.textBoard[state.active.catKey].category;
  var item = isVideo ? board.videoSlots[state.active.qIndex] : board.textBoard[state.active.catKey].questions[state.active.qIndex];

  var media;
  if (isVideo) {
    var player;
    if (state.playing) {
      var src = "https://www.youtube.com/embed/" + item.id + "?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1";
      player =
        '<iframe src="' + src + '" allow="autoplay; encrypted-media" allowfullscreen></iframe>' +
        '<div class="strip-top"></div>';
    } else {
      player =
        '<button class="play-cover" data-action="play">' +
          '<span class="play-circle">&#9654;</span>' +
          '<span style="font-weight:800;color:#aab0d8">Play the opening</span>' +
        '</button>';
    }
    media = '<div><div class="video-frame">' + player + '</div>' +
      (state.playing ? '<p style="text-align:center;margin-top:8px;font-size:12px"><a href="https://www.youtube.com/watch?v=' + item.id + '" target="_blank" rel="noreferrer">Video not loading? Tap to open it on YouTube</a></p>' : '') +
    '</div>';
  } else {
    media = '<div style="background:#1d2455;border-radius:16px;padding:28px 22px;font-size:21px;line-height:1.5;text-align:center;font-weight:600;min-height:90px;display:flex;align-items:center;justify-content:center">' + esc(item.q) + '</div>';
  }

  var revealBlock;
  if (!state.revealed) {
    revealBlock = '<button class="big-gold" data-action="reveal">Reveal Answer</button>';
  } else if (state.answerHidden) {
    revealBlock = '<button class="big-gold" data-action="toggleAnswer">Show Answer</button>';
  } else {
    revealBlock = '<div class="answer-box">' + esc(item.a) + '</div>' +
      '<button class="big-gold" style="background:#2a2f55;color:#aab0d8" data-action="toggleAnswer">Hide Answer</button>';
  }

  var scoreBlock = "";
  if (state.revealed) {
    var rows = state.players.map(function (p, i) {
      return '<div class="row-item">' +
        '<span class="dot" style="background:' + p.color + '"></span>' +
        '<span style="flex:1;font-weight:700">' + esc(p.name) + '</span>' +
        '<span style="color:#aab0d8;font-weight:700;min-width:54px;text-align:right">' + p.score + '</span>' +
        '<button class="plus-btn" data-action="plus" data-i="' + i + '">+' + value + '</button>' +
        '<button class="minus-btn" data-action="minus" data-i="' + i + '">&minus;' + value + '</button>' +
      '</div>';
    }).join("");
    scoreBlock =
      '<p style="color:#aab0d8;text-align:center;margin:22px 0 8px;font-size:14px;font-weight:600">Tap a player: green adds points, red subtracts.</p>' +
      '<div style="display:flex;flex-direction:column;gap:10px">' + rows + '</div>' +
      '<button class="big-gold" style="background:#3da9fc;color:#04203a" data-action="close">Back to Board</button>';
  }

  var hint = (isVideo && !state.revealed && state.playing) ? '<p style="color:#aab0d8;text-align:center;margin-top:12px;font-size:13px">Players shout out the anime, then reveal when they have guessed.</p>' : '';

  var menu = renderMenu([
    { label: "Switch Board (Keep Players)", action: "confirmSwitchBoard" },
    { label: "New Game (Reset Scores)", action: "confirmNewRound" },
    { label: "New Players", action: "confirmNewPlayers" },
  ]);

  return menu + '<div class="wrap"><div class="inner" style="max-width:620px;margin:0 auto">' +
    '<div style="text-align:center;color:#aab0d8;font-weight:700;font-size:14px;letter-spacing:1px">' + esc(catName.toUpperCase()) + '</div>' +
    '<div style="text-align:center;color:' + gold + ';font-weight:900;font-size:28px;margin-bottom:14px">' + value + ' pts</div>' +
    media + hint + revealBlock + scoreBlock +
  '</div></div>';
}

function viewBoard() {
  var board = currentBoard();
  var categories = getCategories();
  var leader = state.players.reduce(function (b, p) { return p.score > b.score ? p : b; }, state.players[0]);
  var totalTiles = categories.length * 5;
  var allUsed = Object.keys(state.used).length === totalTiles;

  var chips = state.players.map(function (p, i) {
    var on = i === state.turn;
    return '<div class="chip" style="background:' + (on ? p.color : "#161b3d") + ';color:' + (on ? "#0b0f24" : "#fff") + ';border:2px solid ' + (on ? "#fff" : "transparent") + '">' +
      '<span style="width:10px;height:10px;border-radius:50%;background:' + (on ? "#0b0f24" : p.color) + '"></span>' +
      esc(p.name) + ': ' + p.score +
    '</div>';
  }).join("");

  var heads = categories.map(function (col) {
    return '<div class="cat-head" style="background:' + (col.isVideo ? "#7a2f6f" : "#3a2f8f") + '">' + esc(col.category) + '</div>';
  }).join("");

  var tiles = "";
  for (var row = 0; row < 5; row++) {
    for (var ci = 0; ci < categories.length; ci++) {
      var col = categories[ci];
      var isVideoCol = !!col.isVideo;
      var catKey = isVideoCol ? VIDEO : ci;
      var key = catKey + "-" + row;
      var isUsed = !!state.used[key];
      var val = isVideoCol ? board.videoSlots[row].value : col.questions[row].value;
      var bgc = isUsed ? "#10142e" : (isVideoCol ? "#3a1d3f" : "#1d2455");
      var fgc = isUsed ? "#2a2f55" : gold;
      tiles += '<button class="tile" style="background:' + bgc + ';color:' + fgc + ';cursor:' + (isUsed ? "default" : "pointer") + '" ' +
        (isUsed ? "disabled" : 'data-action="open" data-cat="' + catKey + '" data-row="' + row + '"') + '>' +
        (isUsed ? "" : val) + '</button>';
    }
  }

  var controls = "";
  if (allUsed) controls += '<button class="btn-gold" style="padding:12px 20px" data-action="confirmNewRound">Play Again (reset scores)</button>';

  var menu = renderMenu([
    { label: "Switch Board (Keep Players)", action: "confirmSwitchBoard" },
    { label: "New Game (Reset Scores)", action: "confirmNewRound" },
    { label: "New Players", action: "confirmNewPlayers" },
  ]);

  return menu + '<div style="min-height:100vh;padding:16px 12px"><div style="max-width:820px;margin:0 auto">' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px">' + chips + '</div>' +
    '<div style="text-align:center;color:' + gold + ';font-weight:800;font-size:14px;margin-bottom:14px">' +
      (allUsed ? 'Round over. Leader: ' + esc(leader.name) + ' (' + leader.score + ')' : esc(state.players[state.turn].name) + "'s pick") +
    '</div>' +
    '<div class="board-grid" style="grid-template-columns:repeat(' + categories.length + ',1fr)">' + heads + tiles + '</div>' +
    '<div style="display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap">' + controls + '</div>' +
  '</div></div>';
}

function renderConfirm() {
  if (!state.confirm) return "";
  return '<div class="confirm-overlay">' +
    '<div class="confirm-card">' +
      '<p class="confirm-msg">' + esc(state.confirm.message) + '</p>' +
      '<div class="confirm-actions">' +
        '<button class="confirm-btn-cancel" data-action="cancelConfirm">Cancel</button>' +
        '<button class="confirm-btn-yes" data-action="confirmYes">Yes, Continue</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ---- render + events ----
function render() {
  var root = document.getElementById("root");
  var html;
  if (state.phase === "players") html = viewPlayers();
  else if (state.phase === "boards") html = viewBoards();
  else if (state.phase === "question" && state.active) html = viewQuestion();
  else html = viewBoard();
  root.innerHTML = html + renderConfirm();

  var nameField = document.getElementById("nameInput");
  if (nameField) {
    nameField.addEventListener("input", function (e) { state.nameInput = e.target.value; });
    nameField.addEventListener("keydown", function (e) { if (e.key === "Enter") addPlayer(); });
  }
}

document.getElementById("root").addEventListener("click", function (e) {
  var t = e.target.closest("[data-action]");
  if (!t) return;
  var action = t.getAttribute("data-action");
  if (action === "selectBoard") selectBoard(t.getAttribute("data-id"));
  else if (action === "continueToBoards") continueToBoards();
  else if (action === "editPlayers") editPlayers();
  else if (action === "switchBoard") switchBoard();
  else if (action === "newPlayers") newPlayers();
  else if (action === "toggleMenu") toggleMenu();
  else if (action === "add") addPlayer();
  else if (action === "remove") removePlayer(+t.getAttribute("data-i"));
  else if (action === "open") openQuestion(t.getAttribute("data-cat") === VIDEO ? VIDEO : +t.getAttribute("data-cat"), +t.getAttribute("data-row"));
  else if (action === "reveal") reveal();
  else if (action === "toggleAnswer") toggleAnswer();
  else if (action === "play") playVideo();
  else if (action === "plus") scoreQuestion(+t.getAttribute("data-i"), true);
  else if (action === "minus") scoreQuestion(+t.getAttribute("data-i"), false);
  else if (action === "close") closeQuestion();
  else if (action === "newRound") newRound();
  else if (action === "confirmSwitchBoard") confirmSwitchBoard();
  else if (action === "confirmNewRound") confirmNewRound();
  else if (action === "confirmNewPlayers") confirmNewPlayers();
  else if (action === "cancelConfirm") cancelConfirm();
  else if (action === "confirmYes") confirmYes();
});

render();
</script>
</body>
</html>
